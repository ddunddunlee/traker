<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="GZ기획팀"/>
<meta name="theme-color" content="#ffffff"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GZ Plan — 계정 관리</title>
<style>
/* ════════════════════════════════════════════
   GZ Plan — 공통 반응형 CSS
   PC(1024+) / Tablet(768-1023) / Mobile(~767)
════════════════════════════════════════════ */

/* ── Reset & 변수 ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0f0ee;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#a8a8a8;
  --border:#e5e5e3;--border2:#d0d0cc;
  --radius:10px;--radius-sm:6px;--pill:999px;
  --blue:#378ADD;--blue-bg:#E6F1FB;--blue-t:#0C447C;
  --amber-bg:#FAEEDA;--amber-t:#633806;
  --green:#639922;--green-bg:#EAF3DE;--green-t:#27500A;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-t:#791F1F;
  --orange:#EF9F27;
  --purple-bg:#EEEDFE;--purple-t:#3C3489;
  --sw:220px;
  --topbar-h:52px;
  --touch-min:44px;
}

/* ── 기본 ── */
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Segoe UI',sans-serif;
  background:var(--bg2);color:var(--text);min-height:100vh;font-size:14px;
  -webkit-text-size-adjust:100%}
.app{display:flex;min-height:100vh}

.sb-item.active .sb-label,




.sb-sync{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.syncing{background:var(--orange);animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── 메인 ── */


/* ── 탑바 ── */
.main-wrap{margin-left:var(--sw);transition:margin-left var(--sb-ease);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.sidebar.collapsed~.main-wrap{margin-left:var(--sw-col)}
.topbar{
  background:var(--bg);border-bottom:0.5px solid var(--border);
  padding:0 24px;height:var(--topbar-h);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;flex-shrink:0;gap:12px;
}
.page-title{font-size:15px;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.topbar-right{display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap}

/* ── 햄버거 ── */






/* ── 버튼 ── */
.btn-ghost{
  padding:0 14px;height:34px;border-radius:var(--radius-sm);font-size:12px;
  border:0.5px solid var(--border);background:transparent;color:var(--text2);
  cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;
}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-solid{
  padding:0 16px;height:34px;border-radius:var(--radius-sm);font-size:12px;
  font-weight:600;border:none;background:var(--text);color:var(--bg);
  cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;
}
.btn-solid:hover{opacity:.82}

/* ── 모달/오버레이 ── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.45);
  align-items:center;justify-content:center;
  z-index:400;padding:1rem;overflow-y:auto;
}
.overlay.show{display:flex}
.modal{
  background:var(--bg);border-radius:var(--radius);border:0.5px solid var(--border);
  padding:1.5rem;width:100%;max-width:440px;
  max-height:calc(100vh - 2rem);overflow-y:auto;
  position:relative;
}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1.25rem}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;flex-wrap:wrap}
.btn-cancel{
  padding:0 16px;height:34px;font-size:12px;
  border:0.5px solid var(--border);border-radius:var(--radius-sm);
  background:transparent;color:var(--text2);cursor:pointer;
}
.btn-ok{
  padding:0 18px;height:34px;font-size:12px;font-weight:600;
  border:none;border-radius:var(--radius-sm);
  background:var(--text);color:var(--bg);cursor:pointer;
}
.btn-danger{
  padding:0 16px;height:34px;font-size:12px;
  border:none;border-radius:var(--radius-sm);
  background:var(--red);color:#fff;cursor:pointer;margin-right:auto;
}
.fg{margin-bottom:1rem}
.fg label{font-size:11px;color:var(--text3);display:block;margin-bottom:5px;
  font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg select,.fg textarea{
  width:100%;padding:8px 10px;font-size:13px;
  border:0.5px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg2);color:var(--text);font-family:inherit;outline:none;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--border2)}

/* ── 토스트 ── */
.toast{
  position:fixed;bottom:2rem;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--text);color:var(--bg);
  font-size:12px;font-weight:500;padding:8px 18px;
  border-radius:var(--pill);opacity:0;transition:all .25s;
  pointer-events:none;z-index:500;white-space:nowrap;
  max-width:calc(100vw - 2rem);text-overflow:ellipsis;overflow:hidden;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── 통계 카드 ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:6px;white-space:nowrap}
.stat-value{font-size:22px;font-weight:600;color:var(--text);line-height:1}
.stat-value.warn{color:#BA7517}.stat-value.danger{color:var(--red)}

/* ── 필터 칩 ── */
.filter-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.chip{
  padding:5px 12px;border-radius:var(--pill);font-size:12px;
  border:0.5px solid var(--border);background:var(--bg);color:var(--text2);
  cursor:pointer;white-space:nowrap;min-height:30px;
  display:inline-flex;align-items:center;
}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.active{background:var(--text);color:var(--bg);border-color:var(--text)}

/* ── 업무 카드 ── */
.task-list{display:flex;flex-direction:column;gap:6px}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:13px}
.task-card{
  background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);
  padding:12px 14px;display:flex;align-items:center;gap:10px;
  cursor:pointer;transition:border-color .12s;position:relative;
  min-height:var(--touch-min);
}
.task-card:hover{border-color:var(--border2)}.task-card.selected{border-color:var(--text)}
.task-card.pinned{border-left:3px solid var(--blue)}
.task-card.overdue{border-left:3px solid var(--red)}
.task-card.stale{border-left:3px solid var(--orange)}
.priority-bar{width:3px;border-radius:var(--pill);align-self:stretch;flex-shrink:0;min-height:32px}
.drag-handle{color:var(--text3);font-size:14px;cursor:grab;user-select:none;flex-shrink:0}
.task-check{
  width:18px;height:18px;border-radius:50%;
  border:1.5px solid var(--border2);flex-shrink:0;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.task-check:hover{border-color:var(--text)}
.task-check.done{background:var(--text);border-color:var(--text)}
.task-check.done::after{content:'';width:5px;height:3px;
  border-left:1.5px solid var(--bg);border-bottom:1.5px solid var(--bg);
  transform:rotate(-45deg) translateY(-1px)}
.task-body{flex:1;min-width:0}
.task-title{
  font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.task-title.done-text{text-decoration:line-through;color:var(--text3)}
.task-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 7px;border-radius:var(--pill);font-weight:600;white-space:nowrap}
.badge-todo{background:var(--blue-bg);color:var(--blue-t)}
.badge-inprogress{background:var(--amber-bg);color:var(--amber-t)}
.badge-done{background:var(--green-bg);color:var(--green-t)}
.badge-status{cursor:pointer;user-select:none}.badge-status:hover{opacity:.75}
.badge-reporter{background:var(--purple-bg);color:var(--purple-t)}
.member-badge{font-size:10px;padding:2px 7px;border-radius:var(--pill);font-weight:600;background:var(--bg3);color:var(--text2)}
.task-date{font-size:11px;color:var(--text3);white-space:nowrap}
.task-date.ov{color:var(--red);font-weight:600}
.card-right{position:absolute;top:10px;right:12px;display:flex;gap:4px;align-items:center}
.pin-btn,.del-btn{
  width:28px;height:28px;border-radius:var(--radius-sm);
  border:none;background:transparent;cursor:pointer;
  font-size:13px;color:var(--text3);
  display:flex;align-items:center;justify-content:center;
}
.pin-btn:hover{background:var(--bg3);color:var(--text)}.pin-btn.on{color:var(--blue)}
.del-btn:hover{background:var(--red-bg);color:var(--red)}

/* ── 중요도/보고자 배지 ── */
.priority-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--pill);cursor:pointer;display:inline-block;white-space:nowrap}
.priority-badge.p1{background:#f0f0ee;color:#888}
.priority-badge.p2{background:var(--blue-bg);color:var(--blue-t)}
.priority-badge.p3{background:var(--amber-bg);color:var(--amber-t)}
.priority-badge.p4{background:var(--red-bg);color:var(--red)}
.priority-badge.p5{background:var(--red);color:#fff}
.reporter-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--pill);cursor:pointer;display:inline-block;background:var(--purple-bg);color:var(--purple-t);white-space:nowrap}

/* ── 상세 패널 ── */
.resizer{width:12px;flex-shrink:0;cursor:col-resize;display:flex;align-items:center;justify-content:center}
.resizer::after{content:'';width:3px;height:30px;background:var(--border);border-radius:var(--pill)}
.resizer:hover::after{background:var(--border2);height:46px}
.detail-panel{
  width:300px;min-width:260px;flex-shrink:0;
  background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);
  display:none;position:sticky;top:calc(var(--topbar-h) + 20px);
  max-height:calc(100vh - var(--topbar-h) - 40px);overflow-y:auto;
}
.detail-panel.open{display:block}
.dp-head{
  padding:14px 16px;border-bottom:0.5px solid var(--bg3);
  display:flex;align-items:flex-start;justify-content:space-between;gap:8px;
  position:sticky;top:0;background:var(--bg);z-index:1;
}
.dp-member{font-size:11px;color:var(--blue);font-weight:600;margin-bottom:3px}
.dp-title-input{
  font-size:14px;font-weight:500;border:none;background:transparent;
  color:var(--text);font-family:inherit;padding:2px 4px;
  border-radius:4px;border:0.5px solid transparent;outline:none;
  width:100%;line-height:1.45;
}
.dp-title-input:hover{border-color:var(--border);background:var(--bg2)}
.dp-title-input:focus{border-color:var(--border2);background:var(--bg2)}
.dp-close{
  width:28px;height:28px;border-radius:var(--radius-sm);
  border:none;background:transparent;color:var(--text3);
  cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.dp-close:hover{background:var(--bg2);color:var(--text)}
.dp-meta{padding:10px 16px;display:flex;flex-direction:column}
.dp-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-bottom:0.5px solid var(--bg3);gap:8px;
}
.dp-row:last-child{border-bottom:none}
.dp-lbl{font-size:11px;color:var(--text3);flex-shrink:0}
.dp-val{font-size:12px;font-weight:500;color:var(--text);text-align:right;word-break:break-word}
.dp-edit{
  font-size:12px;font-weight:500;border:none;background:transparent;
  color:var(--text);font-family:inherit;padding:2px 5px;
  border-radius:4px;border:0.5px solid transparent;outline:none;
  max-width:150px;text-align:right;width:auto;
}
.dp-edit:hover{border-color:var(--border);background:var(--bg2)}
.dp-edit:focus{border-color:var(--border2);background:var(--bg2)}
.dp-sec{font-size:10px;font-weight:600;color:var(--text3);padding:12px 16px 6px;letter-spacing:.06em;text-transform:uppercase}
.progress-wrap{padding:0 16px 12px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px}
.progress-bar-bg{height:4px;background:var(--bg3);border-radius:var(--pill);overflow:hidden}
.progress-bar-fill{height:100%;border-radius:var(--pill);background:var(--text)}
.progress-bar-fill.done-bar{background:var(--green)}.progress-bar-fill.over-bar{background:var(--red)}
.timeline{padding:0 16px 12px;display:flex;flex-direction:column}
.tl-item{display:flex;gap:8px;position:relative}
.tl-line{position:absolute;left:5px;top:13px;bottom:-2px;width:1px;background:var(--border)}
.tl-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:2px;border:1.5px solid var(--border);background:var(--bg);position:relative;z-index:1}
.tl-dot.create{background:var(--blue);border-color:var(--blue)}
.tl-dot.status{background:var(--orange);border-color:var(--orange)}
.tl-dot.done{background:var(--green);border-color:var(--green)}
.tl-body{flex:1;padding-bottom:12px;min-width:0}
.tl-row{display:flex;align-items:flex-start;justify-content:space-between;gap:4px}
.tl-del{width:16px;height:16px;border-radius:3px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:11px;flex-shrink:0;opacity:0;display:flex;align-items:center;justify-content:center}
.tl-item:hover .tl-del{opacity:1}.tl-del:hover{background:var(--red-bg);color:var(--red)}
.tl-author{font-size:10px;font-weight:600;padding:1px 5px;border-radius:var(--pill);background:var(--purple-bg);color:var(--purple-t);margin-right:4px}
.tl-text{font-size:12px;line-height:1.5;color:var(--text2);word-break:break-word}
.tl-date{font-size:10px;color:var(--text3);margin-top:2px;white-space:nowrap}
.dp-note{padding:12px 16px}
.note-input{width:100%;padding:8px 10px;font-size:12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-family:inherit;resize:none;height:58px}
.note-input:focus{outline:none;border-color:var(--border2)}
.note-submit{width:100%;margin-top:6px;padding:0;height:34px;font-size:12px;font-weight:600;border:none;border-radius:var(--radius-sm);background:var(--text);color:var(--bg);cursor:pointer}
.note-submit:hover{opacity:.82}
.divider{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:8px;padding:4px 0 6px}
.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:var(--border)}

/* ── 터치 지원 ── */
button,[onclick],[data-nav],.sb-item,.task-card,.chip{
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}

/* ══════════════════════════════════════════
   반응형 — 태블릿 (768px ~ 1023px)
══════════════════════════════════════════ */
@media(max-width:1023px){
  :root{--sw:220px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .detail-panel{width:280px;min-width:240px}
}

/* ══════════════════════════════════════════
   반응형 — 모바일 (~ 767px)
══════════════════════════════════════════ */
@media(max-width:767px){
  :root{--sw:220px}

  /* 사이드바 슬라이드 */

  /* 햄버거 표시 */
  

  /* 메인 영역 */
  
  .topbar{padding:0 14px;gap:8px}
  .page-title{font-size:14px}

  /* 통계 2열 */
  .stats{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
  .stat{padding:12px}
  .stat-value{font-size:18px}

  /* 필터 스크롤 */
  .filter-row{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .filter-row::-webkit-scrollbar{display:none}

  /* 카드 */
  .task-card{padding:10px 12px;gap:8px}
  .task-title{font-size:12px}
  .card-right{position:static;margin-left:auto;flex-shrink:0}

  /* 상세 패널 전체화면 */
  .detail-panel{
    position:fixed;inset:0;width:100%;max-width:100%;
    border-radius:0;z-index:350;max-height:100vh;
    top:0!important;
  }
  .resizer{display:none}

  /* 모달 */
  .modal{max-width:100%;margin:0;border-radius:var(--radius) var(--radius) 0 0;
    position:fixed;bottom:0;left:0;right:0;max-height:90vh;}
  .overlay{align-items:flex-end;padding:0}

  /* 버튼 크기 */
  .btn-ghost,.btn-solid,.btn-ok,.btn-cancel{height:38px;font-size:13px}
  .chip{min-height:34px;padding:5px 12px}
}

/* ── 페이지 고유 CSS ── */

@media(max-width:767px){
  .account-row{flex-wrap:wrap;gap:6px}
  .acc-actions{width:100%;flex-wrap:wrap}
  .act-btn{flex:1;min-width:60px;text-align:center;justify-content:center}
  .stats{grid-template-columns:repeat(2,1fr)}
  .pw-fields{flex-direction:column}
  .init-box{flex-direction:column;text-align:center}
  .appContent{padding:1rem 14px 5rem!important}
}

/* ── 메인 ── */

.pin-btn,.del-btn{width:24px;height:24px;border-radius:var(--radius-sm);border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--text3);display:flex;align-items:center;justify-content:center}
.pin-btn:hover{background:var(--bg3);color:var(--text)}
.pin-btn.on{color:var(--blue)}

/* ── 사이드바 다크블루 override ── */









.sb-sync{color:rgba(255,255,255,0.45) !important;}
.sb-sync span{color:rgba(255,255,255,0.45) !important;}
.btn-solid{background:#0C447C !important;border-color:#0C447C !important;}
.btn-solid:hover{background:#0a3a6a !important;}
.chip.active{background:#0C447C !important;border-color:#0C447C !important;color:#fff !important;}
  /* ── 사이드바 표준 CSS ── */
  :root{--sw:220px;--sw-col:56px;--sb-ease:.22s cubic-bezier(.4,0,.2,1)}
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
</style>
</head>
<body>
<!-- 모바일 딤 -->
<div id="gz-sidebar" data-active="admin.html" data-variant="admin"></div>

<div class="main-wrap">
  <div class="topbar">
  <button class="hamburger" id="hamburgerBtn" aria-label="메뉴">
    <span></span><span></span><span></span>
  </button><div class="page-title">계정 관리</div></div>
  <div id="gate" style="display:flex;align-items:center;justify-content:center;flex:1">
    <div style="width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:sp .7s linear infinite"></div>
    <style>@keyframes sp{to{transform:rotate(360deg)}}</style>
  </div>
  <div id="appContent" style="display:none;padding:0;width:100%">

  <!-- 탭 헤더 (사이드바 클릭으로 전환) -->

  <!-- 계정 관리 섹션 -->
  <div id="tabAccounts" style="padding:1.5rem 24px 6rem;max-width:900px;margin:0 auto">
    <div class="stats" id="statsRow" style="margin-bottom:1.25rem"></div>
    
    <!-- 계정 목록 -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="font-size:15px;font-weight:700;color:var(--text)">계정 목록</div>
      <button class="btn-solid" id="openAddAccountBtn" style="touch-action:manipulation">+ 계정 추가</button>
    </div>
    <div id="accountList"></div>
  </div>

const FC={apiKey:"AIzaSyA7KylsSyT3_0oQvhBtcrPc-gcdfVq90IQ",authDomain:"gzplan.firebaseapp.com",projectId:"gzplan",storageBucket:"gzplan.firebasestorage.app",messagingSenderId:"186255862586",appId:"1:186255862586:web:f36d21f76012ca43b8fe03"};

const MEMBER_IDS = ["강신욱","김용욱","오문식","이길우","이도영","이상현","이영찬","이윤형"];
const DEFAULT_ORGS = {
  "강신욱": ["IR/이사회 등","시장/경쟁사","보도자료 일정","사업지원본부(인프라지원실)","사업지원본부(경영지원실)","CISO","GLA"],
  "김용욱": ["중국","신규사업본부(시티골프사업부)","글로벌사업팀","글로벌사업개척TF"],
  "오문식": ["신규사업본부(카트사업부)","신규사업본부(시티골프사업부)","기술개발본부(NX개발실)","NX개발실(베트남R&D)"],
  "이길우": ["GS사업본부","AI센서개발실"],
  "이도영": ["미국","베트남"],
  "이상현": ["신규사업본부(플랫폼사업부)","기술개발본부(모바일개발실)","기술개발본부(GDR개발실)"],
  "이영찬": ["GDR직영사업","골프존 클라우드"],
  "이윤형": ["일본","사업지원본부(기획실)"]
};
let currentOrgs = {...DEFAULT_ORGS};

// ── 팀원 순서 관리 ──
let currentOrder = [...MEMBER_IDS];
let dragSrcIdx = null;

window.loadOrder = async function() {
  try {
    const snap = await getDoc(doc(db,'config','memberOrder'));
    if (snap.exists()) currentOrder = snap.data().order || [...MEMBER_IDS];
  } catch(e){console.error("[GZPlan]",e);}
  renderOrder();
};

function renderOrder() {
  const el = document.getElementById('orderList');
  if (!el) return;
  el.innerHTML = currentOrder.map((name, i) => `
    <div class="order-item" draggable="true" data-idx="${i}"
      style="display:flex;align-items:center;gap:12px;background:#fff;border:0.5px solid var(--border);border-radius:10px;padding:14px 18px;cursor:grab;user-select:none">
      <span style="color:var(--text3);font-size:16px">⠿</span>
      <span style="font-size:14px;font-weight:600;color:var(--text)">${name}</span>
      <span style="margin-left:auto;font-size:12px;color:var(--text3)">${i+1}</span>
    </div>
  `).join('');

  // 드래그 이벤트
  el.querySelectorAll('.order-item').forEach(item => {
    item.addEventListener('dragstart', e => {
      dragSrcIdx = parseInt(item.dataset.idx);
      item.style.opacity = '0.4';
    });
    item.addEventListener('dragend', e => {
      item.style.opacity = '1';
    });
    item.addEventListener('dragover', e => {
      e.preventDefault();
      item.style.background = '#F0F4F8';
    });
    item.addEventListener('dragleave', e => {
      item.style.background = '#fff';
    });
    item.addEventListener('drop', e => {
      e.preventDefault();
      item.style.background = '#fff';
      const targetIdx = parseInt(item.dataset.idx);
      if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
      const moved = currentOrder.splice(dragSrcIdx, 1)[0];
      currentOrder.splice(targetIdx, 0, moved);
      renderOrder();
    });
  });
}

window.saveOrder = async function() {
  try {
    await setDoc(doc(db,'config','memberOrder'), { order: currentOrder, updatedAt: new Date().toISOString() });
    toast('순서가 저장됐어요 ✓');
  } catch(e) {
    toast('저장 실패: ' + e.message);
  }
};

window.loadOrgs = async function() {
  try {
    const snap = await getDoc(doc(db,'config','memberOrgs'));
    if (snap.exists()) currentOrgs = snap.data().orgs || DEFAULT_ORGS;
  } catch(e){console.error("[GZPlan]",e);}
  renderOrgs();
};

function renderOrgs() {
  const el = document.getElementById('orgsList');
  if (!el) return;
  el.innerHTML = MEMBER_IDS.map(id => {
    const orgs = currentOrgs[id] || [];
    return `
      <div style="background:#fff;border:0.5px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:12px">
        <div style="font-size:13px;font-weight:700;color:#0C447C;margin-bottom:10px">${id}</div>
        <div id="orgItems_${id}" style="display:flex;flex-direction:column;gap:6px">
          ${orgs.map((org, i) => `
            <div style="display:flex;gap:8px;align-items:center">
              <input value="${org}" data-member="${id}" data-idx="${i}"
                style="flex:1;padding:7px 10px;font-size:12px;border:0.5px solid var(--border);border-radius:6px;outline:none;font-family:inherit"
                oninput="updateOrg(this)"/>
              <button onclick="removeOrg('${id}',${i})" style="width:28px;height:28px;border:0.5px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:14px;color:var(--text3);flex-shrink:0">✕</button>
            </div>`).join('')}
        </div>
        <button onclick="addOrg('${id}')" style="margin-top:8px;font-size:12px;color:var(--blue-t);border:none;background:transparent;cursor:pointer;padding:4px 0">+ 조직 추가</button>
      </div>`;
  }).join('');
}

window.updateOrg = function(input) {
  const member = input.dataset.member;
  const idx = parseInt(input.dataset.idx);
  if (!currentOrgs[member]) currentOrgs[member] = [];
  currentOrgs[member][idx] = input.value;
};

window.addOrg = function(member) {
  if (!currentOrgs[member]) currentOrgs[member] = [];
  currentOrgs[member].push('');
  renderOrgs();
};

window.removeOrg = function(member, idx) {
  if (!currentOrgs[member]) return;
  currentOrgs[member].splice(idx, 1);
  renderOrgs();
};

window.saveOrgs = async function() {
  try {
    await setDoc(doc(db,'config','memberOrgs'), { orgs: currentOrgs, updatedAt: new Date().toISOString() });
    toast('담당 조직이 저장됐어요 ✓');
  } catch(e) {
    toast('저장 실패: ' + e.message);
  }
};

async function init(){
  document.getElementById('gate').style.display='none';
  document.getElementById('appContent').style.display='block';
  await Promise.all([loadAccounts(),loadReporters()]);
}

async function loadAccounts(){
  try{const snap=await getDocs(collection(db,'accounts'));accounts=snap.docs.map(d=>{return {docId:d.id,...d.data()}});accounts.sort((a,b)=>{const o={admin:0,manager:1,member:2};return(o[a.role]??3)-(o[b.role]??3)||a.docId.localeCompare(b.docId,'ko')})}catch{accounts=[]}
  renderStats();renderList();
}

function renderStats(){
  const t=accounts.length,a=accounts.filter(x=>x.role==='admin').length,m=accounts.filter(x=>x.role==='manager').length,mb=accounts.filter(x=>x.role==='member').length;
  document.getElementById('statsRow').innerHTML=`<div class="stat-card"><div class="stat-label">전체 계정</div><div class="stat-value">${t}</div></div><div class="stat-card"><div class="stat-label">어드민</div><div class="stat-value">${a}</div></div><div class="stat-card"><div class="stat-label">팀장</div><div class="stat-value">${m}</div></div><div class="stat-card"><div class="stat-label">팀원</div><div class="stat-value">${mb}</div></div>`;
}

function renderList(){
  const el=document.getElementById('accountList');
  if(!accounts.length){el.innerHTML='<div style="text-align:center;padding:3rem;color:var(--text3);font-size:13px">등록된 계정이 없어요</div>';return;}
  const rl={admin:'어드민',manager:'팀장',member:'팀원'};
  const roleCls={admin:'role-admin',manager:'role-manager',member:'role-member'};
  el.innerHTML=`<div style="display:flex;flex-direction:column;gap:8px">`+accounts.map(a=>{
    const isMe=a.docId===currentUser?.id;
    return `<div style="background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <!-- 아바타 -->
        <div style="width:36px;height:36px;border-radius:50%;background:var(--text);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--bg);flex-shrink:0">
          ${(a.displayName||a.docId).slice(0,1)}
        </div>
        <!-- 정보 -->
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px">
            <span style="font-size:14px;font-weight:600;color:var(--text)">${a.displayName||a.docId}</span>
            ${isMe?'<span style="font-size:10px;color:var(--text3);padding:1px 6px;border-radius:var(--pill);background:var(--bg3)">나</span>':''}
            <span class="role-badge ${roleCls[a.role]||'role-member'}">${rl[a.role]||a.role}</span>
            <span class="status-badge ${a.disabled?'status-off':'status-on'}">${a.disabled?'비활성':'활성'}</span>
          </div>
          <div style="font-size:11px;color:var(--text3)">@${a.docId}</div>
        </div>
        <!-- 액션 버튼 -->
        <div style="display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0">
          <button class="act-btn" data-action="pw" data-id="${a.docId}" data-name="${a.displayName||a.docId}" style="padding:5px 10px;font-size:11px">🔑 비번</button>
          <button class="act-btn" data-action="role" data-id="${a.docId}" data-name="${a.displayName||a.docId}" data-role="${a.role}" style="padding:5px 10px;font-size:11px">👤 역할</button>
          ${isMe?'':`
          <button class="act-btn ${a.disabled?'':'danger'}" data-action="toggle" data-id="${a.docId}" data-disabled="${a.disabled?'1':'0'}" style="padding:5px 10px;font-size:11px">${a.disabled?'✅ 활성화':'⏸ 비활성'}</button>
          <button class="act-btn danger" data-action="del" data-id="${a.docId}" data-name="${a.displayName||a.docId}" style="padding:5px 10px;font-size:11px">🗑 삭제</button>`}
        </div>
      </div>
    </div>`;
  }).join('')+'</div>';
}

// 계정 목록 이벤트 위임
document.getElementById('accountList')?.addEventListener('click',e=>{
  const btn=e.target.closest('[data-action]');if(!btn)return;
  const {action,id,name,role,disabled}=btn.dataset;
  if(action==='pw'){editingId=id;document.getElementById('pwTargetLabel').textContent=`대상: ${name} (@${id})`;document.getElementById('newPw').value='';document.getElementById('pwOverlay').classList.add('show');}
  else if(action==='role'){editingId=id;document.getElementById('roleTargetLabel').textContent=`대상: ${name} (@${id})`;document.getElementById('newRole').value=role;document.getElementById('roleOverlay').classList.add('show');}
  else if(action==='toggle'){if(!confirm(`이 계정을 ${disabled==='1'?'활성화':'비활성화'}할까요?`))return;updateDoc(doc(db,'accounts',id),{disabled:disabled==='1'?false:true}).then(()=>{toast('변경됐어요 ✓');loadAccounts();});}
  else if(action==='del'){if(id===currentUser?.id){toast('자신의 계정은 삭제할 수 없어요');return;}if(!confirm(`"${name}" 계정을 삭제할까요?`))return;deleteDoc(doc(db,'accounts',id)).then(()=>{toast('삭제됐어요');loadAccounts();});}
});

window._changePw = async () => {
  const _cpe=document.getElementById('curPw'); if(!_cpe) return; const cur=_cpe.value,nw=document.getElementById('newAdminPw').value,cf=document.getElementById('confirmAdminPw').value,err=document.getElementById('adminPwErr');
  err.textContent='';
  if(!cur||!nw||!cf){err.textContent='모든 항목을 입력해주세요';return}
  if(nw!==cf){err.textContent='새 비밀번호가 일치하지 않아요';return}
  if(nw.length<4){err.textContent='4자 이상 입력해주세요';return}
  const snap=await getDoc(doc(db,'accounts','admin'));
  const expected=snap.exists()?snap.data().password:'admin1234';
  if(cur!==expected){err.textContent='현재 비밀번호가 틀렸어요';return}
  await setDoc(doc(db,'accounts','admin'),{displayName:'admin',password:nw,role:'admin',disabled:false,updatedAt:new Date().toISOString()},{merge:true});
  ['curPw','newAdminPw','confirmAdminPw'].forEach(id=>document.getElementById(id).value='');
  toast('비밀번호가 변경됐어요 ✓');
};
document.getElementById('changePwBtn')?.addEventListener('click', window._changePw);;

// 계정 추가
window._openAddAccount = () => {
  ['aName','aId','aPw'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('aRole').value='member';document.getElementById('addErr').textContent='';
  document.getElementById('addAccountOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('aName').focus(),80);
};
document.getElementById('openAddAccountBtn')?.addEventListener('click', window._openAddAccount);
document.getElementById('addAccountCancelBtn')?.addEventListener('click',()=>closeOverlay('addAccountOverlay'));
document.getElementById('addAccountOkBtn')?.addEventListener('click',async()=>{
  const name=document.getElementById('aName').value.trim(),id=document.getElementById('aId').value.trim(),pw=document.getElementById('aPw').value,role=document.getElementById('aRole').value,err=document.getElementById('addErr');
  err.textContent='';
  if(!name||!id||!pw){err.textContent='모든 항목을 입력해주세요';return}
  if(pw.length<4){err.textContent='비밀번호는 4자 이상이어야 해요';return}
  const ex=await getDoc(doc(db,'accounts',id));
  if(ex.exists()){err.textContent='이미 사용 중인 아이디예요';return}
  await setDoc(doc(db,'accounts',id),{displayName:name,password:pw,role,disabled:false,createdAt:new Date().toISOString()});
  closeOverlay('addAccountOverlay');toast(`${name} 계정을 추가했어요 ✓`);loadAccounts();
});
document.getElementById('aPwShowBtn')?.addEventListener('click',()=>{const e=document.getElementById('aPw');e.type=e.type==='password'?'text':'password';});

// 비번 변경
document.getElementById('pwCancelBtn')?.addEventListener('click',()=>closeOverlay('pwOverlay'));
document.getElementById('pwOkBtn')?.addEventListener('click',async()=>{
  const pw=document.getElementById('newPw').value;
  if(!pw){toast('새 비밀번호를 입력해주세요');return}
  if(pw.length<4){toast('4자 이상 입력해주세요');return}
  await updateDoc(doc(db,'accounts',editingId),{password:pw});
  closeOverlay('pwOverlay');toast('비밀번호를 변경했어요 ✓');
});
document.getElementById('newPwShowBtn')?.addEventListener('click',()=>{const e=document.getElementById('newPw');e.type=e.type==='password'?'text':'password';});

// 역할 변경
document.getElementById('roleCancelBtn')?.addEventListener('click',()=>closeOverlay('roleOverlay'));
document.getElementById('roleOkBtn')?.addEventListener('click',async()=>{
  await updateDoc(doc(db,'accounts',editingId),{role:document.getElementById('newRole').value});
  closeOverlay('roleOverlay');toast('역할을 변경했어요 ✓');loadAccounts();
});

// 보고자
async function loadReporters(){
  try{const snap=await getDoc(doc(db,'settings','reporters'));reporters=snap.exists()?(snap.data().list||[]):[];}catch{reporters=[]}
  renderReporters();
}
async function saveReporters(){await setDoc(doc(db,'settings','reporters'),{list:reporters});}
function renderReporters(){
  const el=document.getElementById('reporterList');
  if(!reporters.length){el.innerHTML='<div style="color:var(--text3);font-size:13px;padding:1rem 0">등록된 보고자가 없어요</div>';return;}
  el.innerHTML=reporters.map((r,i)=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg2);border-radius:var(--radius-sm);gap:10px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;width:22px;height:22px;background:var(--purple-bg);color:var(--purple-t);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600">${i+1}</span>
        <span style="font-size:14px;font-weight:500;color:var(--text)">${r}</span>
      </div>
      <button data-ri="${i}" style="padding:3px 10px;font-size:12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--red);cursor:pointer">삭제</button>
    </div>`).join('');
}
document.getElementById('reporterList')?.addEventListener('click',async e=>{
  const btn=e.target.closest('[data-ri]');if(!btn)return;
  const i=parseInt(btn.dataset.ri);const name=reporters[i];
  if(!confirm(`"${name}"을 삭제할까요?`))return;
  reporters.splice(i,1);await saveReporters();renderReporters();toast('삭제됐어요');
});
window._openAddReporter = () => {document.getElementById('rName').value='';document.getElementById('reporterOverlay').classList.add('show');setTimeout(()=>document.getElementById('rName').focus(),80);};
document.getElementById('openAddReporterBtn')?.addEventListener('click', window._openAddReporter);
document.getElementById('reporterCancelBtn')?.addEventListener('click',()=>closeOverlay('reporterOverlay'));
document.getElementById('reporterOkBtn')?.addEventListener('click',async()=>{
  const name=document.getElementById('rName').value.trim();
  if(!name){toast('이름을 입력해주세요');return}
  if(reporters.includes(name)){toast('이미 있는 보고자예요');return}
  reporters.push(name);await saveReporters();closeOverlay('reporterOverlay');renderReporters();toast(`"${name}" 추가됐어요 ✓`);
});

init();
</script>

<script>
// ── 공통 버튼 바인딩 (즉시 실행) ──
document.addEventListener('DOMContentLoaded', function() {
  // 사이드바 토글
  (function(){
    var sb = document.querySelector('.sidebar');
    var toggle = document.getElementById('sbToggleBtn');
    if(!sb || !toggle) return;
    if(localStorage.getItem('gz_sb_collapsed')==='1') sb.classList.add('collapsed');
    toggle.addEventListener('click', function(){
      sb.classList.toggle('collapsed');
      localStorage.setItem('gz_sb_collapsed', sb.classList.contains('collapsed')?'1':'0');
    });
  })();

  // 로그아웃
  var lb = document.getElementById('logoutBtn');
  if (lb) lb.addEventListener('click', function() {
    localStorage.removeItem('tt_user'); sessionStorage.clear(); location.href = 'index.html';
  });
  // 사이드바 네비
  document.querySelectorAll('[data-nav]').forEach(function(el) {
    el.addEventListener('click', function() { location.href = el.dataset.nav; });
  });
});
</script>
