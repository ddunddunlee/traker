<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<link rel="manifest" href="./manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="GZкё°нҡҚнҢҖ"/>
<meta name="theme-color" content="#ffffff"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GZ Plan вҖ” нҷҲ</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0f0ee;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#a8a8a8;
  --border:#e5e5e3;--border2:#d0d0cc;
  --radius:10px;--radius-sm:6px;--pill:999px;
  --blue:#378ADD;--blue-bg:#E6F1FB;--blue-t:#0C447C;
  --amber-bg:#FAEEDA;--amber-t:#633806;
  --green:#639922;--green-bg:#EAF3DE;--green-t:#27500A;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-t:#791F1F;
  --orange:#EF9F27;
  --purple-bg:#EEEDFE;--purple-t:#3C3489;
  --sw:220px;
  --sw-col:56px;--sb-ease:.22s cubic-bezier(.4,0,.2,1);
  --topbar-h:52px;
  --touch-min:44px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Segoe UI',sans-serif;
  background:var(--bg2);color:var(--text);min-height:100vh;font-size:14px;
  -webkit-text-size-adjust:100%;margin:0;padding:0}
html,body{height:100%;overflow:hidden;margin:0;padding:0}

/* нҲҙнҢҒ (collapsed) */








/* в”Җв”Җ л©”мқё в”Җв”Җ */



/* нғ‘л°” */
.main-wrap{margin-left:var(--sw);transition:margin-left var(--sb-ease);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.sidebar.collapsed~.main-wrap{margin-left:var(--sw-col)}
.topbar{
  height:48px;background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0;
;position:sticky;top:0;z-index:50}
.tb-title{font-size:14px;font-weight:600;color:var(--text)}
.tb-sep{color:var(--border2)}
.tb-sub{font-size:12px;color:var(--text3)}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn-ghost{
  display:flex;align-items:center;gap:5px;
  padding:5px 11px;border-radius:var(--radius-sm);
  font-size:12px;color:var(--text2);
  border:1px solid var(--border);background:var(--bg);
  cursor:pointer;font-family:inherit;transition:all .12s;
}
.btn-ghost:hover{background:var(--bg2)}
.btn-blue{
  display:flex;align-items:center;gap:5px;
  padding:5px 13px;border-radius:var(--radius-sm);
  font-size:12px;font-weight:600;color:#fff;
  background:var(--blue);border:none;cursor:pointer;
  font-family:inherit;transition:opacity .12s;
}
.btn-blue:hover{opacity:.88}

/* лҢҖмӢңліҙл“ң ліёл¬ё */
.dash-body{
  flex:1;overflow-y:auto;padding:0 16px 60px;
  display:flex;flex-direction:column;gap:14px;
}
.dash-body::-webkit-scrollbar{width:4px}
.dash-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
.kpi{
  background:var(--bg);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;
}
.kpi-top{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.kpi-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.kpi-lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}
.kpi-num{font-size:26px;font-weight:700;color:var(--text);line-height:1;margin-bottom:4px;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.kpi-sub{font-size:11px;color:var(--text3)}
.kpi-sub.up{color:var(--green)}
.kpi-sub.dn{color:var(--red)}

/* мӨ‘м•ҷ 2лӢЁ */
.mid-row{display:grid;grid-template-columns:340px 1fr;gap:12px;min-height:0}

/* м№ҙл“ң кіөнҶө */
.card{
  background:var(--bg);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;display:flex;flex-direction:column;
}
.card-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.card-title{font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.card-link{font-size:11px;color:var(--blue);cursor:pointer}
.card-link:hover{text-decoration:underline}

/* мҳӨлҠҳ н•  мқј */
.today-list{display:flex;flex-direction:column;flex:1;overflow-y:auto}
.today-item{
  display:flex;align-items:center;gap:9px;
  padding:9px 14px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .1s;
}
.today-item:last-child{border-bottom:none}
.today-item:hover{background:var(--bg2)}
.t-check{
  width:15px;height:15px;border-radius:4px;
  border:1.5px solid var(--border2);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all .1s;
}
.t-check.done{background:var(--green);border-color:var(--green);color:#fff;font-size:9px}
.t-title{font-size:12px;color:var(--text);flex:1;line-height:1.4}
.t-title.done{text-decoration:line-through;color:var(--text3)}
.t-due{font-size:10px;font-weight:600;flex-shrink:0;padding:2px 7px;border-radius:999px}
.t-due.done{background:var(--green-bg);color:var(--green-dk)}
.t-due.late{background:var(--red-bg);color:var(--red-dk)}
.t-due.today{background:var(--blue-bg);color:var(--blue-dk)}
.t-due.soon{background:var(--amber-bg);color:var(--amber-dk)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;gap:8px;flex:1}
.empty-icon{font-size:28px;opacity:.3}
.empty-txt{font-size:12px;color:var(--text3);text-align:center}

/* мәҳлҰ°лҚ” */
.cal-wrap{display:flex;flex-direction:column}
.cal-toolbar{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.cal-month{font-size:13px;font-weight:600;color:var(--text)}
.cal-nav{width:24px;height:24px;border-radius:6px;border:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--text2);transition:all .12s}
.cal-nav:hover{background:var(--bg2)}
.cal-grid{display:flex;flex-direction:column}
.cal-day-row{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border);flex-shrink:0}
.cal-dlbl{padding:6px 0;text-align:center;font-size:10px;font-weight:600;color:var(--text3)}
.cal-cells{display:grid;grid-template-columns:repeat(7,1fr);flex:1}
.cal-cell{
  min-height:100px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);
  padding:5px;overflow:hidden;
}
.cal-cell:nth-child(7n){border-right:none}
.cal-num{
  font-size:11px;color:var(--text3);
  width:20px;height:20px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;margin-bottom:2px;font-weight:500;
}
.cal-num.today{background:var(--blue);color:#fff;font-weight:700}
.cal-num.dim{color:var(--border2)}
.cal-pill{
  font-size:10px;padding:1px 5px;border-radius:3px;
  margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  display:block;cursor:pointer;transition:filter .1s;
}
.cal-pill:hover{filter:brightness(.92)}
.cal-pill.blue{background:var(--blue-bg);color:var(--blue-dk)}
.cal-pill.green{background:var(--green-bg);color:var(--green-dk)}
.cal-pill.amber{background:var(--amber-bg);color:var(--amber-dk)}
.cal-pill.red{background:var(--red-bg);color:var(--red-dk)}
.cal-more{font-size:10px;color:var(--text3);cursor:pointer;padding:1px 3px}
.cal-more:hover{color:var(--blue)}

/* н•ҳлӢЁ 2лӢЁ */
.bot-row{display:grid;grid-template-columns:1fr 240px;gap:12px}

/* нҢҖ м—…лҚ°мқҙнҠё */
.upd-list{display:flex;flex-direction:column;flex:1;overflow-y:auto}
.upd-item{display:flex;gap:9px;padding:9px 14px;border-bottom:1px solid var(--border)}
.upd-item:last-child{border-bottom:none}
.upd-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:5px}
.upd-dot.g{background:var(--green)}
.upd-dot.r{background:var(--red)}
.upd-dot.a{background:var(--amber)}
.upd-txt{font-size:12px;color:var(--text2);flex:1;line-height:1.5}
.upd-txt strong{color:var(--text);font-weight:600}
.upd-time{font-size:10px;color:var(--text3);flex-shrink:0;margin-top:2px}






/* м•ҢлҰј л°°л„Ҳ */
.alert-banner{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;background:var(--red-bg);
  border:1px solid #fca5a5;border-radius:var(--radius-sm);
  font-size:12px;color:var(--red-dk);
  animation:slideDown .2s ease;
}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.alert-banner .al-close{margin-left:auto;cursor:pointer;opacity:.6;font-size:16px;line-height:1}
.alert-banner .al-close:hover{opacity:1}

/* нҶ мҠӨнҠё */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--text);color:#fff;font-size:12px;
  padding:8px 16px;border-radius:999px;
  opacity:0;transition:opacity .2s;pointer-events:none;z-index:999;white-space:nowrap;
}
.toast.show{opacity:1}

.card:has(.cal-wrap){overflow:visible}
.today-item{cursor:pointer;transition:opacity .15s}
.today-item .t-check{cursor:pointer;transition:all .15s}
.today-item .t-title.done{opacity:.4;text-decoration:line-through}
.today-item .t-check.done{background:var(--green,#639922);color:#fff;border-color:var(--green,#639922)}

.detail-panel{
  width:320px;
  background:var(--bg);border-left:0.5px solid var(--border);
  display:none;position:fixed;top:0;right:0;bottom:0;
  z-index:400;overflow-y:auto;
  box-shadow:-4px 0 16px rgba(0,0,0,.08);
}
.detail-panel.open{display:block}
.dp-head{
  padding:14px 16px;border-bottom:0.5px solid var(--bg3);
  display:flex;align-items:flex-start;justify-content:space-between;gap:8px;
  position:sticky;top:0;background:var(--bg);z-index:1;
}
.dp-member{font-size:11px;color:var(--blue);font-weight:600;margin-bottom:3px}
.dp-title-input{
  font-size:14px;font-weight:500;border:none;background:transparent;
  color:var(--text);font-family:inherit;padding:2px 4px;
  border-radius:4px;border:0.5px solid transparent;outline:none;
  width:100%;line-height:1.45;
}
.dp-title-input:hover{border-color:var(--border);background:var(--bg2)}
.dp-title-input:focus{border-color:var(--border2);background:var(--bg2)}
.dp-close{
  width:28px;height:28px;border-radius:var(--radius-sm);
  border:none;background:transparent;color:var(--text3);
  cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.dp-close:hover{background:var(--bg2);color:var(--text)}
.dp-meta{padding:10px 16px;display:flex;flex-direction:column}
.dp-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-bottom:0.5px solid var(--bg3);gap:8px;
}
.dp-row:last-child{border-bottom:none}
.dp-lbl{font-size:11px;color:var(--text3);flex-shrink:0}
.dp-val{font-size:12px;font-weight:500;color:var(--text);text-align:right;word-break:break-word}
.dp-edit{
  font-size:12px;font-weight:500;border:none;background:transparent;
  color:var(--text);font-family:inherit;padding:2px 5px;
  border-radius:4px;border:0.5px solid transparent;outline:none;
  max-width:150px;text-align:right;width:auto;
}
.dp-edit:hover{border-color:var(--border);background:var(--bg2)}
.dp-edit:focus{border-color:var(--border2);background:var(--bg2)}
.dp-sec{font-size:10px;font-weight:600;color:var(--text3);padding:12px 16px 6px;letter-spacing:.06em;text-transform:uppercase}
.progress-wrap{padding:0 16px 12px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px}
.progress-bar-bg{height:4px;background:var(--bg3);border-radius:var(--pill);overflow:hidden}
.progress-bar-fill{height:100%;border-radius:var(--pill);background:var(--text)}
.progress-bar-fill.done-bar{background:var(--green)}.progress-bar-fill.over-bar{background:var(--red)}
.timeline{padding:0 16px 12px;display:flex;flex-direction:column}
.tl-item{display:flex;gap:8px;position:relative}
.tl-line{position:absolute;left:5px;top:13px;bottom:-2px;width:1px;background:var(--border)}
.tl-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:2px;border:1.5px solid var(--border);background:var(--bg);position:relative;z-index:1}
.tl-dot.create{background:var(--blue);border-color:var(--blue)}
.tl-dot.status{background:var(--orange);border-color:var(--orange)}
.tl-dot.done{background:var(--green);border-color:var(--green)}
.tl-body{flex:1;padding-bottom:12px;min-width:0}
.tl-row{display:flex;align-items:flex-start;justify-content:space-between;gap:4px}
.tl-del{width:16px;height:16px;border-radius:3px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:11px;flex-shrink:0;opacity:0;display:flex;align-items:center;justify-content:center}
.tl-item:hover .tl-del{opacity:1}.tl-del:hover{background:var(--red-bg);color:var(--red)}
.tl-author{font-size:10px;font-weight:600;padding:1px 5px;border-radius:var(--pill);background:var(--purple-bg);color:var(--purple-t);margin-right:4px}
.tl-text{font-size:12px;line-height:1.5;color:var(--text2);word-break:break-word}
.tl-date{font-size:10px;color:var(--text3);margin-top:2px;white-space:nowrap}
.dp-note{padding:12px 16px}
.note-input{width:100%;padding:8px 10px;font-size:12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-family:inherit;resize:none;height:58px}
.note-input:focus{outline:none;border-color:var(--border2)}
.note-submit{width:100%;margin-top:6px;padding:0;height:34px;font-size:12px;font-weight:600;border:none;border-radius:var(--radius-sm);background:var(--text);color:var(--bg);cursor:pointer}
.note-submit:hover{opacity:.82}
.divider{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:8px;padding:4px 0 6px}
.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:var(--border)}

/* в”Җв”Җ н„°м№ҳ м§Җмӣҗ в”Җв”Җ */
button,[onclick],[data-nav],.sb-item,.task-card,.chip{
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}

.t-due.no-due{color:var(--text3)}</style>
<script src="./shared/sidebar.js" defer></script>
</head>
<body>

<div id="gz-sidebar" data-active="dashboard.html"></div>

<div class="main-wrap" id="mainWrap">
  <div class="topbar">
    <div class="tb-title">нҷҲ</div>
    <span class="tb-sep">В·</span>
    <div class="tb-sub" id="topSub">кІҪмҳҒкё°нҡҚнҢҖ</div>
    <div class="tb-r">
      <button class="btn-ghost" onclick="location.href='member.html'">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/></svg>
        лӮҙ м—…л¬ҙ
      </button>
      <button class="btn-ghost" onclick="location.href='calendar.html'">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        мәҳлҰ°лҚ”
      </button>
    </div>
  </div>

  <div class="dash-body" id="dashBody">

    <!-- кё°н•ңмҙҲкіј м•ҢлҰј л°°л„Ҳ -->
    <div class="alert-banner" id="alertBanner" style="display:none">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="alertText"></span>
      <span class="al-close" onclick="document.getElementById('alertBanner').style.display='none'">Г—</span>
    </div>

    <!-- KPI -->
    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-top"><div class="kpi-dot" style="background:var(--text3)"></div><div class="kpi-lbl">м „мІҙ м—…л¬ҙ</div></div>
        <div class="kpi-num" id="kTotal">вҖ”</div>
        <div class="kpi-sub">мқҙлІҲ лӢ¬</div>
      </div>
      <div class="kpi">
        <div class="kpi-top"><div class="kpi-dot" style="background:var(--blue)"></div><div class="kpi-lbl">м§„н–ү мӨ‘</div></div>
        <div class="kpi-num" id="kDoing">вҖ”</div>
        <div class="kpi-sub up">мӢӨмӢңк°„</div>
      </div>
      <div class="kpi">
        <div class="kpi-top"><div class="kpi-dot" style="background:var(--amber)"></div><div class="kpi-lbl">кё°н•ң мһ„л°•</div></div>
        <div class="kpi-num" id="kUrgent">вҖ”</div>
        <div class="kpi-sub dn" id="kUrgentSub">7мқј мқҙлӮҙ</div>
      </div>
      <div class="kpi">
        <div class="kpi-top"><div class="kpi-dot" style="background:var(--green)"></div><div class="kpi-lbl">мҷ„лЈҢ</div></div>
        <div class="kpi-num" id="kDone">вҖ”</div>
        <div class="kpi-sub up">лҲ„м Ғ</div>
      </div>
    </div>

    <!-- мәҳлҰ°лҚ” (м „мІҙ л„Ҳл№„) -->
    <div class="card" style="overflow:visible">
      <div class="card-hdr">
        <div class="card-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          мәҳлҰ°лҚ”
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="cal-nav" id="calPrev">вҖ№</div>
          <div class="cal-month" id="calTitle"></div>
          <div class="cal-nav" id="calNext">вҖә</div>
          <div class="card-link" onclick="location.href='calendar.html'" style="margin-left:8px">м „мІҙліҙкё° вҶ’</div>
        </div>
      </div>
      <div id="calMemberFilter" style="display:none;padding:6px 12px 0;gap:5px;flex-wrap:wrap;align-items:center"></div>
      <div class="cal-grid">
        <div class="cal-day-row">
          <div class="cal-dlbl">мӣ”</div><div class="cal-dlbl">нҷ”</div><div class="cal-dlbl">мҲҳ</div>
          <div class="cal-dlbl">лӘ©</div><div class="cal-dlbl">кёҲ</div>
          <div class="cal-dlbl" style="opacity:.4">нҶ </div>
          <div class="cal-dlbl" style="color:var(--red);opacity:.6">мқј</div>
        </div>
        <div class="cal-cells" id="calCells"></div>
      </div>
    </div>

    <!-- мҳӨлҠҳн• мқј + нҢҖм—…лҚ°мқҙнҠё (50:50) -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">

      <!-- мҳӨлҠҳ н•  мқј -->
      <div class="card">
        <div class="card-hdr">
          <div class="card-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
            мҳӨлҠҳ н•  мқј
            <span style="font-size:11px;color:var(--text3);font-weight:400" id="todayLbl"></span>
          </div>

// в”Җв”Җ м„ём…ҳ нҷ•мқё в”Җв”Җ

// в”Җв”Җ мң нӢё в”Җв”Җ
const toStr = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

// лӮ м§ң

// в”Җв”Җ мғҒнғң в”Җв”Җ
let tasks = []; const _tasksByMid = {}; // midлі„ м—…л¬ҙ м•Ҳм „н•ҳкІҢ кҙҖлҰ¬
let schedules = [];

// нҢҖмһҘ: м „мІҙ нҢҖмӣҗ м—…л¬ҙ кө¬лҸ… (midлі„ MapмңјлЎң м•Ҳм „н•ҳкІҢ кҙҖлҰ¬)
if (isMgr) {
  // нҢҖмһҘ ліёмқё IDлҘј MEMBER_IDSм—җ нҷ•мӢӨнһҲ нҸ¬н•Ё (мғүмғҒ л§Өм№ӯ ліҙмһҘ)
  const mgrId = MEMBER_IDS.find(id => id === ME.id || id === ME.displayName) || ME.displayName || ME.id;
  if (!MEMBER_IDS.includes(mgrId)) MEMBER_IDS.push(mgrId);

  // Firestore кІҪлЎң кё°мӨҖ мӨ‘ліө м ңкұ° (к°ҷмқҖ кІҪлЎң мӨ‘ліө кө¬лҸ… л°©м§Җ)
  // MEMBER_IDSл§Ң кө¬лҸ… (mgrIdк°Җ мқҙлҜё нҸ¬н•ЁлҗЁ)

      const _flat = Object.values(_tasksByMid).flat();

      tasks = _flat.filter(t => {

      renderKPI(); renderToday(); renderCalendar(); renderShortcut(); renderAlert();

}

// в”Җв”Җ мқјм • кө¬лҸ… в”Җв”Җ
onSnapshot(collection(db,'teams',TEAM_ID,'schedules'), snap => {

});
// в”Җв”Җ кіөнҶөм—…л¬ҙ кө¬лҸ… в”Җв”Җ
onSnapshot(query(collection(db,'teams',TEAM_ID,'sharedTasks'), orderBy('createdAt','desc')), snap => {

// в”Җв”Җ нҢҖ м—…лҚ°мқҙнҠё (м „ нҢҖмӣҗ мөңмӢ  м—…л¬ҙ) в”Җв”Җ
MEMBER_IDS.forEach(mid => {
  onSnapshot(query(collection(db,'teams',TEAM_ID,'tasks',mid,'items'), orderBy('order','asc')), snap => {
    renderUpdates(mid, snap.docs.map(d => ({_id:d.id,_mid:mid,...d.data()})));
  });

let allUpdTasks = {};
function renderUpdates(mid, taskList) {
  allUpdTasks[mid] = taskList;
  const all = Object.values(allUpdTasks).flat()
    .filter(t => t.updated || t.createdAt)
    .sort((a,b) => (b.updated||'') > (a.updated||'') ? 1 : -1)
    .slice(0,8);

  const el = document.getElementById('updList');
  if (!all.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-txt">м—…лҚ°мқҙнҠё лӮҙм—ӯмқҙ м—Ҷм–ҙмҡ”</div></div>';
    return;
  }
  const statusMap = {todo:'лҢҖкё°',inprogress:'м§„н–үмӨ‘',done:'мҷ„лЈҢ',hold:'ліҙлҘҳ'};
  const dotMap    = {done:'g',inprogress:'',hold:'a',todo:''};
  el.innerHTML = all.map(t => {
    const rel = relTime(t.updated||'');
    return `<div class="upd-item">
      <div class="upd-dot ${dotMap[t.status]||''}"></div>
      <div class="upd-txt"><strong>${t._mid||ME.id}</strong> В· ${t.title||'(м ңлӘ©м—ҶмқҢ)'}<br><span style="font-size:10px;color:var(--text3)">${statusMap[t.status]||t.status}${t.due?' В· '+t.due:''}</span></div>
      <div class="upd-time">${rel}</div>
    </div>`;
  }).join('');
}

function relTime(d) {
  if (!d) return '';
  const diff = Math.floor((Date.now() - new Date(d))/60000);
  if (diff < 1)    return 'л°©кёҲ';
  if (diff < 60)   return `${diff}л¶„`;
  if (diff < 1440) return `${Math.floor(diff/60)}мӢңк°„`;
  return `${Math.floor(diff/1440)}мқјм „`;
}

// в”Җв”Җ KPI в”Җв”Җ
function renderKPI() {
  // кіөнҶөм—…л¬ҙ sharedTaskId кё°мӨҖ мӨ‘ліө м ңкұ° + _id мӨ‘ліө м ңкұ°
  const _dedupTasks = (arr) => {
    // sharedTaskIdлі„ лҢҖн‘ң м„ м •: л№„мҷ„лЈҢ мҡ°м„ 
    const repMap = new Map();
    arr.forEach(t => {
      const sid = t.sharedTaskId || (t.isShared ? t._id : null);
      if (!sid) return;
      if (!repMap.has(sid)) { repMap.set(sid, t); }
      else if (repMap.get(sid).status === 'done' && t.status !== 'done') { repMap.set(sid, t); }
    });
    const seenId  = new Set();
    const seenSid = new Set();
    return arr.filter(t => {
      if (seenId.has(t._id)) return false;
      seenId.add(t._id);
      const sid = t.sharedTaskId || (t.isShared ? t._id : null);
      if (!sid) return true;
      if (seenSid.has(sid)) return false;
      seenSid.add(sid);
      return repMap.get(sid) === t;
    });
  };
  // нҢҖмһҘ: м „мІҙ нҢҖмӣҗ м—…л¬ҙ / нҢҖмӣҗ: ліёмқё м—…л¬ҙл§Ң
  const kpiTasks = _dedupTasks(isMgr
    ? tasks.filter(t => t.status !== undefined)
    : tasks.filter(t => !t._mid || t._mid === ME.id || t._mid === ME.displayName));

  const total   = kpiTasks.length;
  const doing   = kpiTasks.filter(t => t.status==='inprogress').length;
  const done    = kpiTasks.filter(t => t.status==='done').length;
  const urgent  = kpiTasks.filter(t => {
    if (t.status!=='inprogress') return false;
    const due = t.due||t.startDate; if(!due) return false;
    const diff = (new Date(due)-new Date())/86400000;
    return diff<=7 && diff>=0;
  }).length;
  const overdue = kpiTasks.filter(t => {
    if (t.status==='done') return false;
    return t.due && new Date(t.due) < new Date();
  }).length;

  document.getElementById('kTotal').textContent  = String(total).padStart(2,'0');
  document.getElementById('kDoing').textContent  = String(doing).padStart(2,'0');
  document.getElementById('kDone').textContent   = String(done).padStart(2,'0');

  // кё°н•ңмһ„л°• м№ҙл“ң: мһ„л°•+мҙҲкіј н•©мӮ°, м„ңлёҢн…ҚмҠӨнҠём—җ л¶„лҰ¬ н‘ңмӢң
  const urgSub = document.getElementById('kUrgentSub');
  document.getElementById('kUrgent').textContent = String(urgent + overdue).padStart(2,'0');
  if (overdue > 0 && urgent > 0) {
    urgSub.textContent = `мһ„л°• ${urgent} / мҙҲкіј ${overdue}`;
    urgSub.className = 'kpi-sub dn';
  } else if (overdue > 0) {
    urgSub.textContent = `кё°н•ңмҙҲкіј ${overdue}кұҙ`;
    urgSub.className = 'kpi-sub dn';
  } else {
    urgSub.textContent = '7мқј мқҙлӮҙ';
    urgSub.className = 'kpi-sub';
  }

  // мӮ¬мқҙл“ңл°” л°°м§Җ: кё°н•ңмҙҲкіј(л№Ёк°•) > кё°н•ңмһ„л°• 7мқј(мЈјнҷ©) мҡ°м„ 
  const isImminentFn = t => {
    if (t.status !== 'inprogress') return false;
    const diff = (new Date(t.due) - new Date()) / 86400000;
    return diff >= 0 && diff <= 7;
  };
  const imminentCount = kpiTasks.filter(isImminentFn).length;
  const badge = document.getElementById('urgentBadge');
  if (badge) {
    const total = overdue + imminentCount;
    if (total > 0) {
      badge.textContent = total;
      badge.style.display = '';
      badge.style.background = overdue > 0 ? '#EF4444' : '#EF9F27';
    } else {
      badge.style.display = 'none';
    }
  }
}

// в”Җв”Җ кё°н•ңмҙҲкіј м•ҢлҰј л°°л„Ҳ в”Җв”Җ
function renderAlert() {
  const _seenA = new Set();
  const dedupedA = tasks.filter(t => {
    const sid = t.sharedTaskId || (t.isShared ? t._id : null);
    if (!sid) return true;
    if (_seenA.has(sid)) return false;
    _seenA.add(sid); return true;
  });
  const overdue = dedupedA.filter(t => {
    if (t.status==='done') return false;
    return t.due && new Date(t.due) < new Date();
  });
  const banner = document.getElementById('alertBanner');
  if (overdue.length > 0 && sessionStorage.getItem('gz_alert_closed') !== '1') {
    document.getElementById('alertText').textContent =
      `кё°н•ң мҙҲкіј м—…л¬ҙк°Җ ${overdue.length}кұҙ мһҲм–ҙмҡ” вҖ” ${overdue.slice(0,2).map(t=>t.title).join(', ')}${overdue.length>2?' мҷё '+( overdue.length-2)+'кұҙ':''}`;
    banner.style.display = 'flex';
  } else {
    banner.style.display = 'none';
  }
  // лӢ«кё° лІ„нҠј
  banner.querySelector('.al-close').onclick = () => {
    banner.style.display = 'none';
    sessionStorage.setItem('gz_alert_closed','1');
  };
}

// в”Җв”Җ мҳӨлҠҳ н•  мқј в”Җв”Җ
function renderToday() {
  const _seenT = new Set();
  const myTasks = tasks.filter(t => {
    if (!(!t._mid || t._mid === ME.id || t._mid === ME.displayName)) return false;
    const sid = t.sharedTaskId || (t.isShared ? t._id : null);
    if (!sid) return true;
    if (_seenT.has(sid)) return false;
    _seenT.add(sid); return true;
  }); // ліёмқё м—…л¬ҙл§Ң + кіөнҶөм—…л¬ҙ мӨ‘ліө м ңкұ°
  const overdue = myTasks.filter(t => {
    if(t.status==='done') return false;
    if(!t.due) return false; // мў…лЈҢмқј лҜём„Өм • вҶ’ кё°н•ңмҙҲкіј м•„лӢҳ
    return t.due < today;
  });
  const todayT = myTasks.filter(t => {
    if(t.status==='done') return false;
    const s = t.startDate||t.due; const e = t.due||t.startDate;
    return s && e && s<=today && today<=e;
  });

  const items = [...overdue.map(t=>({...t,_late:true})), ...todayT].slice(0,6);
  const el = document.getElementById('todayList');

  if (!items.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">вң“</div>
      <div class="empty-txt">мҳӨлҠҳ н•  мқјмқҙ м—Ҷм–ҙмҡ”<br>м—¬мң лЎӯкІҢ м—…л¬ҙлҘј лҸҢм•„ліј л•ҢмҳҲмҡ”</div>
    </div>`;
    return;
  }

  el.innerHTML = items.map(t => {
    const isDone = t.status==='done';
    const dueStr = isDone ? 'мҷ„лЈҢ' : t._late ? 'кё°н•ңмҙҲкіј' : !t.due ? 'мў…лЈҢмқј лҜём„Өм •' : today===t.due ? 'мҳӨлҠҳ' : 'м§„н–үмӨ‘';
    const dueCls = isDone ? 'done' : t._late ? 'late' : !t.due ? 'no-due' : today===t.due ? 'today' : 'soon';
    const mid    = t._mid || ME.id;
    const color  = MEMBER_COLORS[MEMBER_IDS.indexOf(mid)] || '#378ADD';
    return `<div class="today-item" data-id="${t._id}" onclick="toggleDone('${t._id}','${t.status}','${mid}')">
      <div class="t-check${isDone?' done':'}'}">${isDone?'вң“':''}</div>
      <div class="t-title${isDone?' done':''}">
        ${isMgr && t._mid ? `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${color};margin-right:5px;vertical-align:1px"></span>` : ''}
        ${t.title||'(м ңлӘ©м—ҶмқҢ)'}
      </div>
      <span class="t-due ${dueCls}">${dueStr}</span>
    </div>`;
  }).join('');
}

// мҳӨлҠҳн• мқј лЎңм»¬ мІҙнҒ¬ мғҒнғң (мғҲлЎңкі м№Ё мӢң мҙҲкё°нҷ”)
const _checkedToday = new Set();

window.toggleDone = function(id, status, mid) {
  if (_checkedToday.has(id)) {
    _checkedToday.delete(id);
  } else {
    _checkedToday.add(id);
  }
  // мІҙнҒ¬ мғҒнғң UIл§Ң м—…лҚ°мқҙнҠё
  const item = document.querySelector('.today-item[data-id="'+id+'"]');
  if (item) {
    const checked = _checkedToday.has(id);
    const chk = item.querySelector('.t-check');
    const title = item.querySelector('.t-title');
    if (chk) { chk.textContent = checked ? 'вң“' : ''; chk.classList.toggle('done', checked); }
    if (title) title.classList.toggle('done', checked);
  }
};

// в”Җв”Җ л°”лЎңк°Җкё° л¶Җм ң в”Җв”Җ
function renderShortcut() {
  const doing  = tasks.filter(t=>t.status==='inprogress').length;
  const wait   = tasks.filter(t=>t.status==='todo').length;
  var _sc1=document.getElementById('sc1Sub');if(_sc1)_sc1.textContent=`м§„н–үмӨ‘ ${doing}к°ң В· лҢҖкё° ${wait}к°ң`;
}

// в”Җв”Җ мәҳлҰ°лҚ” в”Җв”Җ
function renderCalendar() {
  document.getElementById('calTitle').textContent = `${calYear}л…„ ${calMonth+1}мӣ”`;
  const cells    = document.getElementById('calCells');
  const firstDow = new Date(calYear,calMonth,1).getDay();
  const startDow = firstDow===0 ? 6 : firstDow-1;
  const lastDate = new Date(calYear,calMonth+1,0).getDate();
  const total    = Math.ceil((startDow+lastDate)/7)*7;

  // лӮ м§ңлі„ м „мІҙ лҚ°мқҙн„° л§ө (н‘ңмӢң м ңн•ң м—Ҷмқҙ м „л¶Җ м ҖмһҘ)
  const taskMapAll = {}; window._calTaskMap = taskMapAll;

  // в‘  кіөнҶөмқјм •(schedules type:common) лЁјм Җ
  const _calFirstDay = toStr(new Date(calYear, calMonth, 1));
  const _calLastDay  = toStr(new Date(calYear, calMonth+1, 0));

  schedules.forEach(s => {
    if (s.source === 'meeting') return;
    const isCommon = s.type === 'common' || s.isCommon;
    if (!isCommon && s.authorId && s.authorId !== ME.id) return;
    const sd = s.startDate || s.date;
    const ed = s.endDate || s.date || sd;
    if (!sd || sd > _calLastDay || ed < _calFirstDay) return;
    let curD = new Date(sd + 'T00:00:00');
    const endD = new Date(ed + 'T00:00:00');
    while (curD <= endD) {
      const k = toStr(curD);
      const [ky, km] = k.split('-').map(Number);
      if (ky === calYear && km-1 === calMonth) {
        if (!taskMapAll[k]) taskMapAll[k] = [];
        taskMapAll[k].push({title: (isCommon ? '[кіөнҶө] ' : '') + (s.title||'мқјм •'), _type: s.type||'personal', _isCommon: isCommon, _mid: s.authorId||ME.id, _schId: s._id||s.id||''});
      }
      curD.setDate(curD.getDate()+1);
    }
  });

  // в‘Ў кіөнҶөм—…л¬ҙ(sharedTasks)
  sharedTasks.forEach(t => {
    if (!t.startDate) return;
    const sd = t.startDate, ed = t.endDate || t.startDate;
    if (sd > _calLastDay || ed < _calFirstDay) return;
    let d = new Date(sd + 'T00:00:00');
    const endD = new Date(ed + 'T00:00:00');
    while (d <= endD) {
      const k = toStr(d);
      if (!taskMapAll[k]) taskMapAll[k] = [];
      taskMapAll[k].push({title:'[кіөнҶө] '+(t.title||'кіөнҶөм—…л¬ҙ'), _type:'common', _isCommon:true});
      d.setDate(d.getDate()+1);
    }
  });

  // в‘ў ліёмқё м—…л¬ҙ (нҢҖмһҘмқҙл©ҙ нҳ„мЈјмҡ© м—…л¬ҙ нҸ¬н•Ё)
  // нҢҖмһҘ: calMemberSel н•„н„° м Ғмҡ©, нҢҖмӣҗ: ліёмқё м—…л¬ҙл§Ң
  const calTasks = isMgr
    ? (calMemberSel ? tasks.filter(t => t._mid === calMemberSel) : tasks)
    : tasks.filter(t => !t._mid || t._mid === ME.id || t._mid === ME.displayName);
  calTasks.forEach(t => {
    const s = t.startDate||t.due; const e = t.due||t.startDate;
    if (!s) return;
    for (let d=new Date(s+'T00:00:00'); d<=new Date((e||s)+'T00:00:00'); d.setDate(d.getDate()+1)) {
      const k = toStr(new Date(d));
      if (!taskMapAll[k]) taskMapAll[k]=[];
      taskMapAll[k].push(t);
    }
  });

  // н‘ңмӢңмҡ© taskMap: лӮ м§ңлі„ мөңлҢҖ 3к°ң + 'more'
  const taskMap = {};
  Object.keys(taskMapAll).forEach(k => {
    const all = taskMapAll[k];
    if (all.length <= 3) { taskMap[k] = all; }
    else { taskMap[k] = [...all.slice(0,3), 'more']; }
  });

  const pillColor = t => {
    if (t._isCommon || t._type === 'common') return '#888'; // кіөнҶө вҶ’ нҡҢмғү
    if (t._sch) {
      // к°ңмқёмқјм • вҶ’ лӢҙлӢ№мһҗ мғүмғҒ
      const mid = t._mid || ME.id;
      const ci = MEMBER_IDS.indexOf(mid);
      return ci >= 0 ? MEMBER_COLORS[ci] : '#888';
    }
    // м—…л¬ҙ вҶ’ лӢҙлӢ№мһҗ мғүмғҒ
    const mid = t._mid || ME.id;
    const ci = MEMBER_IDS.indexOf(mid);
    return ci >= 0 ? MEMBER_COLORS[ci] : '#888';
  };

  cells.innerHTML = '';
  for (let i=0; i<total; i++) {
    const day    = i-startDow+1;
    const valid  = day>=1 && day<=lastDate;
    const dStr   = valid ? `${calYear}-${pad2(calMonth+1)}-${pad2(day)}` : '';
    const isToday= dStr===today;
    const cell   = document.createElement('div');
    cell.className = 'cal-cell';
    if (valid) {
      cell.style.cursor = 'pointer';
      cell.addEventListener('click', (e) => {
        if (e.target.classList.contains('cal-more') || e.target.closest('.cal-more')) return;
        if (e.target.classList.contains('cal-pill') || e.target.closest('.cal-pill')) return;
        // л№Ҳ лӮ м§ң нҒҙлҰӯ мӢң м•„л¬ҙ лҸҷмһ‘ м—ҶмқҢ
      });
    }
    if (!valid) { cell.innerHTML='<div class="cal-num dim">В·</div>'; cells.appendChild(cell); continue; }
    let html = `<div class="cal-num${isToday?' today':''}">${day}</div>`;
    const dayT = taskMap[dStr]||[];
    let more=0;
    dayT.forEach(t => {
      if (t==='more'){more++;return;}
      const _pid = t._id || t.id || '';
      const _pmid = t._mid || ME.id;
      const _schId = t._schId || '';
      const _isTask = !!t._id;
      const _isSch = !!_schId;
      let _onclick = '';
      if (_isTask) {
        _onclick = `onclick="event.stopPropagation();event.preventDefault();window.openTaskDetail('${_pid}','${_pmid}')"`;
      } else if (_isSch) {
        _onclick = `onclick="event.stopPropagation();event.preventDefault();window.openScheduleDetail('${_schId}',${!!t._isCommon},event)"`;
      }
      html+=`<div class="cal-pill" style="background:${pillColor(t)};color:#fff;border-color:${pillColor(t)};cursor:pointer" ${_onclick}>${t.title||'(м ңлӘ©м—ҶмқҢ)'}</div>`;
    });
    if (more) html+=`<div class="cal-more" onclick="showMorePopup(event,'${dStr}')" style="cursor:pointer">+${more}к°ң лҚ”ліҙкё°</div>`;
    cell.innerHTML=html;
    cells.appendChild(cell);
  }
}

(function initCalMemberFilter() {

  const myMid = MEMBER_IDS.find(id => id === ME.id || id === ME.displayName) || ME.id;
  calMemberSel = myMid; // кё°ліё: ліёмқё

  const allMembers = [
    { id: myMid, label: myMid },
    ...MEMBER_IDS.filter(id => id !== myMid).map(id => ({ id, label: id }))
  ];

  function renderChips() {
    wrap.innerHTML = allMembers.map(m => {
      const ci = MEMBER_IDS.indexOf(m.id);
      const color = ci >= 0 ? MEMBER_COLORS[ci] : '#888';
      const active = calMemberSel === m.id;
      return `<div onclick="window.setCalMember('${m.id}')" style="cursor:pointer;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:500;border:1.5px solid ${color};background:${active ? color : 'transparent'};color:${active ? '#fff' : color};transition:.15s">${m.label}</div>`;
    }).join('') +
    `<div onclick="window.setCalMember(null)" style="cursor:pointer;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:500;border:1.5px solid #aaa;background:${calMemberSel === null ? '#aaa' : 'transparent'};color:${calMemberSel === null ? '#fff' : '#aaa'};transition:.15s">м „мІҙ</div>`;
  }

  window.setCalMember = function(mid) {
    calMemberSel = mid;
    renderChips();
    renderCalendar();
  };

  renderChips();
})();

renderCalendar();

window.showMorePopup = function(e, dateStr) {
  e.stopPropagation();
  var popup = document.getElementById('calMorePopup');
  if (!popup) {
    popup = document.createElement('div');
    popup.id = 'calMorePopup';
    popup.style.cssText = 'position:fixed;background:#fff;border:1px solid #dde3ea;border-radius:8px;padding:10px 14px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:999;min-width:180px;max-width:260px;font-size:13px';
    document.body.appendChild(popup);
  }
  var all = window._calTaskMap && window._calTaskMap[dateStr] ? window._calTaskMap[dateStr] : [];
  var items = all.filter(function(t){ return t !== 'more'; });
  var d = new Date(dateStr); var label = (d.getMonth()+1)+'/'+d.getDate();
  popup.innerHTML = '<div style="font-weight:600;margin-bottom:8px">'+label+' м—…л¬ҙ</div>'+(items.length?items.map(function(t){return '<div style="padding:4px 0;border-bottom:1px solid #f0f0f0">'+( t.title||'(м ңлӘ©м—ҶмқҢ)')+'</div>';}).join(''):'<div style="color:#aaa">м—ҶмқҢ</div>');
  var x=e.clientX,y=e.clientY;
  if(x+270>window.innerWidth)x=window.innerWidth-275;
  if(y+200>window.innerHeight)y=window.innerHeight-205;
  popup.style.left=x+'px';popup.style.top=y+'px';popup.style.display='block';
  setTimeout(function(){document.addEventListener('click',function hide(){popup.style.display='none';document.removeEventListener('click',hide);});},10);
};

window._dashSelTask = null;
window._dashSelMid  = null;
window.openTaskDetail = function(taskId, mid) {
  window._dashSelTask = taskId;

  const t = tasks.find(t => t._id === taskId);

window.changeTaskStatus = async function(newStatus) {
  if (!window._dashSelTask) return;
  const t = tasks.find(t => t._id === window._dashSelTask);
  if (!t || t.status === newStatus) return;
  const mid = window._dashSelMid || t._mid || ME.id;
  const ts = new Date().toISOString().slice(0,10);
  const labels = {todo:'лҢҖкё°', inprogress:'м§„н–ү мӨ‘', done:'мҷ„лЈҢ'};
  const hist = [...(t.history||[]), {
    id: Date.now()+'', type:'status',
    text: `${labels[t.status]||t.status} вҶ’ ${labels[newStatus]||newStatus}`,
    date: new Date().toISOString(), author: ME.displayName||ME.id
  }];
  try {
    await updateDoc(doc(db,'teams',TEAM_ID,'tasks',mid,'items',window._dashSelTask), {status:newStatus, updated:ts, history:hist});
    t.status = newStatus; t.updated = ts; t.history = hist;
    renderDashDetail(t, mid);
  } catch(e) { console.error('[GZPlan]', e); }
};

window._dashAddNote = async function() {
  const inp = document.getElementById('noteInput');
  if (!inp || !inp.value.trim()) return;
  const text = inp.value.trim();
  if (!window._dashSelTask) return;
  const t = tasks.find(t => t._id === window._dashSelTask);
  if (!t) return;
  const mid = window._dashSelMid || t._mid || ME.id;
  const ts = new Date().toISOString();
  const hist = [...(t.history||[]), {
    id: Date.now()+'', type:'note',
    text, date: ts, author: ME.displayName||ME.id
  }];
  try {
    await updateDoc(doc(db,'teams',TEAM_ID,'tasks',mid,'items',window._dashSelTask), {history:hist, updated:ts.slice(0,10)});
    t.history = hist; t.updated = ts.slice(0,10);
    inp.value = '';
    renderDashDetail(t, mid);
  } catch(e) { console.error('[GZPlan]', e); }
};

function renderDashDetail(t, mid) {
  const el = document.getElementById('dpTitle');
  if (el) el.value = t.title || '';
  
  const sl = {todo:'лҢҖкё°', inprogress:'м§„н–ү мӨ‘', done:'мҷ„лЈҢ'};
  mid = mid || t._mid || ME.id;
  
  const body = document.getElementById('dpMeta');
  if (!body) return;

  const isOver = t.due && new Date(t.due) < new Date() && t.status !== 'done';
  const isImminent = t.status === 'inprogress' && t.due && (() => { const d=(new Date(t.due)-new Date())/86400000; return d>=0&&d<=7; })();

  // м§„н–ү л°”
  const progressBar = (() => {
    if (!t.startDate || !t.due) return '';
    const start = new Date(t.startDate), end = new Date(t.due), today = new Date(); today.setHours(0,0,0,0);
    const total = Math.ceil((end - start) / 86400000);
    const elapsed = Math.ceil((today - start) / 86400000);
    if (total <= 0) return '';
    const pct = Math.min(100, Math.max(0, Math.round(elapsed / total * 100)));
    const isDone = t.status === 'done', isOv = elapsed > total && !isDone;
    const fillCls = isDone ? 'done-bar' : isOv ? 'over-bar' : '';
    const label = isDone ? 'мҷ„лЈҢ' : isOv ? `кё°н•ң мҙҲкіј +${elapsed - total}мқј` : `${Math.max(0, elapsed)}мқј / ${total}мқј (${pct}%)`;
    const labelColor = isDone ? 'var(--green)' : isOv ? 'var(--red)' : 'var(--text3)';
    return `<div class="progress-wrap">
      <div class="progress-label"><span style="color:var(--text3)">м§„н–үлҘ </span><span style="color:${labelColor};font-weight:${isOv?'600':'400'}">${label}</span></div>
      <div class="progress-bar-bg"><div class="progress-bar-fill ${fillCls}" style="width:${pct}%"></div></div>
    </div>`;
  })();

  body.innerHTML = `
    <div class="dp-row"><span class="dp-lbl">мғҒнғң</span>
      <select class="dp-status-sel" onchange="window.changeTaskStatus(this.value)" style="border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;font-family:inherit;background:var(--bg);cursor:pointer">
        <option value="todo" ${t.status==='todo'?'selected':''}>лҢҖкё°</option>
        <option value="inprogress" ${t.status==='inprogress'?'selected':''}>м§„н–ү мӨ‘</option>
        <option value="done" ${t.status==='done'?'selected':''}>мҷ„лЈҢ</option>
      </select>
    </div>
    <div class="dp-row"><span class="dp-lbl">лӢҙлӢ№мһҗ</span>
      <span style="display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:500;background:#E6F1FB;color:#0C447C;border:0.5px solid #B5D4F4">${mid}</span>
    </div>
    ${t.startDate?`<div class="dp-row"><span class="dp-lbl">мӢңмһ‘мқј</span><span class="dp-val">${t.startDate}</span></div>`:''}
    ${t.due?`<div class="dp-row"><span class="dp-lbl">л§Ҳк°җмқј</span><span class="dp-val" style="color:${isOver?'var(--red)':isImminent?'var(--orange)':'inherit'};font-weight:${isOver||isImminent?'600':'400'}">${t.due}${isOver?' вҡ пёҸ':isImminent?' вҸ°':''}</span></div>`:''}
    ${t.priority?`<div class="dp-row"><span class="dp-lbl">мӨ‘мҡ”лҸ„</span><span class="dp-val">${{5:'л§Өмҡ° кёҙкёү',4:'кёҙкёү',3:'ліҙнҶө',2:'лӮ®мқҢ',1:'л§Өмҡ° лӮ®мқҢ'}[t.priority]||'ліҙнҶө'}</span></div>`:''}
    ${t.desc?`<div class="dp-row" style="flex-direction:column;gap:6px"><span class="dp-lbl">м„ӨлӘ…</span><div class="dp-val" style="white-space:pre-wrap;font-size:12px;background:var(--bg2);padding:8px;border-radius:6px">${t.desc}</div></div>`:''}
    ${progressBar}
    <div class="dp-row"><span class="dp-lbl">м—…лҚ°мқҙнҠё</span><span class="dp-val" style="font-size:11px">${t.updated||'-'}</span></div>
  `;

  // нһҲмҠӨнҶ лҰ¬ - tl-item мҠӨнғҖмқј
  const hist = document.getElementById('dpTimeline');
  if (hist) {
    const sorted = [...(t.history||[])].sort((a,b) => new Date(b.date) - new Date(a.date));
    hist.innerHTML = sorted.map((h, i) => `
      <div class="tl-item">
        <div class="tl-dot ${h.type||'status'}"></div>
        ${i < sorted.length - 1 ? '<div class="tl-line"></div>' : ''}
        <div class="tl-body">
          <div class="tl-row">
            <div class="tl-text">
              ${h.author ? `<span class="tl-author">${h.author}</span>` : ''}
              ${(h.text||'').replace(/^мғҒнғң ліҖкІҪ: /, '').replace(/ \(нҢҖмһҘ\)$/, '').replace(/ \(нҢҖмӣҗ\)$/, '')}
            </div>
          </div>
          <div class="tl-date">${h.date ? h.date.replace('T',' ').slice(0,16) : ''}</div>
        </div>
      </div>`).join('');
  }
}

  var old = document.getElementById('schPopup');

  const canDelete = isCommon ? isMgr : (s.authorId === ME.id || isMgr);

  popup.style.cssText = 'position:fixed;background:#fff;border:0.5px solid #dde3ea;border-radius:10px;padding:14px 16px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:999;min-width:220px;max-width:280px;font-size:13px;font-family:inherit';
  popup.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <span style="font-weight:600;color:#1a1a1a">${s.title||'мқјм •'}</span>
      <button onclick="document.getElementById('schPopup').remove()" style="background:none;border:none;cursor:pointer;font-size:16px;color:#aaa;padding:0 2px">вң•</button>
    </div>
    <div style="color:#6b6b6b;font-size:12px;margin-bottom:4px">${isCommon ? 'рҹҸў кіөнҶө мқјм •' : 'рҹ“… к°ңмқё мқјм •'}</div>
    ${s.startDate ? `<div style="color:#6b6b6b;font-size:12px">${s.startDate}${s.endDate && s.endDate !== s.startDate ? ' ~ ' + s.endDate : ''}</div>` : ''}
    ${s.memo ? `<div style="margin-top:8px;color:#333;font-size:12px;white-space:pre-wrap">${s.memo}</div>` : ''}
    ${canDelete ? `<button onclick="window.deleteScheduleDash('${schId}')" style="margin-top:12px;width:100%;padding:7px;background:#EF4444;color:#fff;border:none;border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit">рҹ—‘ мӮӯм ң</button>` : ''}
  `;
  // мң„м№ҳ кі„мӮ°
  const x = e ? Math.min(e.clientX, window.innerWidth - 300) : window.innerWidth/2 - 140;
  const y = e ? Math.min(e.clientY + 8, window.innerHeight - 250) : window.innerHeight/2;
  popup.style.left = x + 'px';
  popup.style.top = y + 'px';
  document.body.appendChild(popup);
  setTimeout(() => {
    document.addEventListener('click', function h(ev) {
      if (!popup.contains(ev.target)) { popup.remove(); document.removeEventListener('click', h); }
    });
  }, 100);
};

window.deleteScheduleDash = async function(schId) {
  if (!confirm('мқҙ мқјм •мқ„ мӮӯм ңн• к№Ңмҡ”?')) return;
  try {
    await deleteDoc(doc(db,'teams',TEAM_ID,'schedules', schId));
    const panel = document.getElementById('detailPanel');
    if (panel) panel.classList.remove('open');
    toast('мқјм •мқ„ мӮӯм ңн–Ҳм–ҙмҡ” вң“');
  } catch(e) { console.error('[GZPlan]', e); toast('мӮӯм ң мӢӨнҢЁ'); }
};
