<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="GZ기획팀"/>
<meta name="theme-color" content="#ffffff"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>캘린더 — GZ 경영기획팀</title>
<style>
/* ════════════════════════════════════════════
   GZ Plan — 공통 반응형 CSS
   PC(1024+) / Tablet(768-1023) / Mobile(~767)
════════════════════════════════════════════ */

/* ── Reset & 변수 ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0f0ee;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#a8a8a8;
  --border:#e5e5e3;--border2:#d0d0cc;
  --radius:10px;--radius-sm:6px;--pill:999px;
  --blue:#378ADD;--blue-bg:#E6F1FB;--blue-t:#0C447C;
  --amber-bg:#FAEEDA;--amber-t:#633806;
  --green:#639922;--green-bg:#EAF3DE;--green-t:#27500A;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-t:#791F1F;
  --orange:#EF9F27;
  --purple-bg:#EEEDFE;--purple-t:#3C3489;
  --sw:220px;
  --topbar-h:52px;
  --touch-min:44px;
}

/* ── 기본 ── */
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Segoe UI',sans-serif;
  background:var(--bg2);color:var(--text);min-height:100vh;font-size:14px;
  -webkit-text-size-adjust:100%}
.app{display:flex;min-height:100vh}

.sb-item.active .sb-label,




.sb-sync{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,0.45)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.syncing{background:var(--orange);animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── 메인 ── */


/* ── 탑바 ── */
.main-wrap{margin-left:var(--sw);transition:margin-left var(--sb-ease);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.sidebar.collapsed~.main-wrap{margin-left:var(--sw-col)}
.topbar{
  background:var(--bg);border-bottom:0.5px solid var(--border);
  padding:0 24px;height:var(--topbar-h);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;flex-shrink:0;gap:12px;
}
.page-title{font-size:15px;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.topbar-right{display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap}

/* ── 햄버거 ── */






/* ── 버튼 ── */
.btn-ghost{
  padding:0 14px;height:34px;border-radius:var(--radius-sm);font-size:12px;
  border:0.5px solid var(--border);background:transparent;color:var(--text2);
  cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;
}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-solid{
  padding:0 16px;height:34px;border-radius:var(--radius-sm);font-size:12px;
  font-weight:600;border:none;background:var(--text);color:var(--bg);
  cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;
}
.btn-solid:hover{opacity:.82}

/* ── 모달/오버레이 ── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.45);
  align-items:center;justify-content:center;
  z-index:400;padding:1rem;overflow-y:auto;
}
.overlay.show{display:flex}
.modal{
  background:var(--bg);border-radius:var(--radius);border:0.5px solid var(--border);
  padding:1.5rem;width:100%;max-width:440px;
  max-height:calc(100vh - 2rem);overflow-y:auto;
  position:relative;
}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1.25rem}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;flex-wrap:wrap}
.btn-cancel{
  padding:0 16px;height:34px;font-size:12px;
  border:0.5px solid var(--border);border-radius:var(--radius-sm);
  background:transparent;color:var(--text2);cursor:pointer;
}
.btn-ok{
  padding:0 18px;height:34px;font-size:12px;font-weight:600;
  border:none;border-radius:var(--radius-sm);
  background:var(--text);color:var(--bg);cursor:pointer;
}
.btn-danger{
  padding:0 16px;height:34px;font-size:12px;
  border:none;border-radius:var(--radius-sm);
  background:var(--red);color:#fff;cursor:pointer;margin-right:auto;
}
.fg{margin-bottom:1rem}
.fg label{font-size:11px;color:var(--text3);display:block;margin-bottom:5px;
  font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg select,.fg textarea{
  width:100%;padding:8px 10px;font-size:13px;
  border:0.5px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg2);color:var(--text);font-family:inherit;outline:none;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--border2)}

/* ── 토스트 ── */
.toast{
  position:fixed;bottom:2rem;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--text);color:var(--bg);
  font-size:12px;font-weight:500;padding:8px 18px;
  border-radius:var(--pill);opacity:0;transition:all .25s;
  pointer-events:none;z-index:500;white-space:nowrap;
  max-width:calc(100vw - 2rem);text-overflow:ellipsis;overflow:hidden;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── 통계 카드 ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:6px;white-space:nowrap}
.stat-value{font-size:22px;font-weight:600;color:var(--text);line-height:1}
.stat-value.warn{color:#BA7517}.stat-value.danger{color:var(--red)}

/* ── 필터 칩 ── */
.filter-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.chip{
  padding:5px 12px;border-radius:var(--pill);font-size:12px;
  border:0.5px solid var(--border);background:var(--bg);color:var(--text2);
  cursor:pointer;white-space:nowrap;min-height:30px;
  display:inline-flex;align-items:center;
}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.active{background:#0C447C;color:#fff;border-color:#0C447C}

/* ── 업무 카드 ── */
.task-list{display:flex;flex-direction:column;gap:6px}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:13px}
.task-card{
  background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);
  padding:12px 14px;display:flex;align-items:center;gap:10px;
  cursor:pointer;transition:border-color .12s;position:relative;
  min-height:var(--touch-min);
}
.task-card:hover{border-color:var(--border2)}.task-card.selected{border-color:var(--text)}
.task-card.pinned{border-left:3px solid var(--blue)}
.task-card.overdue{border-left:3px solid var(--red)}
.task-card.stale{border-left:3px solid var(--orange)}
.priority-bar{width:3px;border-radius:var(--pill);align-self:stretch;flex-shrink:0;min-height:32px}
.drag-handle{color:var(--text3);font-size:14px;cursor:grab;user-select:none;flex-shrink:0}
.task-check{
  width:18px;height:18px;border-radius:50%;
  border:1.5px solid var(--border2);flex-shrink:0;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.task-check:hover{border-color:var(--text)}
.task-check.done{background:var(--text);border-color:var(--text)}
.task-check.done::after{content:'';width:5px;height:3px;
  border-left:1.5px solid var(--bg);border-bottom:1.5px solid var(--bg);
  transform:rotate(-45deg) translateY(-1px)}
.task-body{flex:1;min-width:0}
.task-title{
  font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.task-title.done-text{text-decoration:line-through;color:var(--text3)}
.task-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 7px;border-radius:var(--pill);font-weight:600;white-space:nowrap}
.badge-todo{background:var(--blue-bg);color:var(--blue-t)}
.badge-inprogress{background:var(--amber-bg);color:var(--amber-t)}
.badge-done{background:var(--green-bg);color:var(--green-t)}
.badge-status{cursor:pointer;user-select:none}.badge-status:hover{opacity:.75}
.badge-reporter{background:var(--purple-bg);color:var(--purple-t)}
.member-badge{font-size:10px;padding:2px 7px;border-radius:var(--pill);font-weight:600;background:var(--bg3);color:var(--text2)}
.task-date{font-size:11px;color:var(--text3);white-space:nowrap}
.task-date.ov{color:var(--red);font-weight:600}
.card-right{position:absolute;top:10px;right:12px;display:flex;gap:4px;align-items:center}
.pin-btn,.del-btn{
  width:28px;height:28px;border-radius:var(--radius-sm);
  border:none;background:transparent;cursor:pointer;
  font-size:13px;color:var(--text3);
  display:flex;align-items:center;justify-content:center;
}
.pin-btn:hover{background:var(--bg3);color:var(--text)}.pin-btn.on{color:var(--blue)}
.del-btn:hover{background:var(--red-bg);color:var(--red)}

/* ── 중요도/보고자 배지 ── */
.priority-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--pill);cursor:pointer;display:inline-block;white-space:nowrap}
.priority-badge.p1{background:#f0f0ee;color:#888}
.priority-badge.p2{background:var(--blue-bg);color:var(--blue-t)}
.priority-badge.p3{background:var(--amber-bg);color:var(--amber-t)}
.priority-badge.p4{background:var(--red-bg);color:var(--red)}
.priority-badge.p5{background:var(--red);color:#fff}
.reporter-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--pill);cursor:pointer;display:inline-block;background:var(--purple-bg);color:var(--purple-t);white-space:nowrap}

/* ── 상세 패널 ── */
.resizer{width:12px;flex-shrink:0;cursor:col-resize;display:flex;align-items:center;justify-content:center}
.resizer::after{content:'';width:3px;height:30px;background:var(--border);border-radius:var(--pill)}
.resizer:hover::after{background:var(--border2);height:46px}
.detail-panel{
  width:300px;min-width:260px;flex-shrink:0;
  background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);
  display:none;position:sticky;top:calc(var(--topbar-h) + 20px);
  max-height:calc(100vh - var(--topbar-h) - 40px);overflow-y:auto;
}
.detail-panel.open{display:block}
.dp-head{
  padding:14px 16px;border-bottom:0.5px solid var(--bg3);
  display:flex;align-items:flex-start;justify-content:space-between;gap:8px;
  position:sticky;top:0;background:var(--bg);z-index:1;
}
.dp-member{font-size:11px;color:var(--blue);font-weight:600;margin-bottom:3px}
.dp-title-input{
  font-size:14px;font-weight:500;border:none;background:transparent;
  color:var(--text);font-family:inherit;padding:2px 4px;
  border-radius:4px;border:0.5px solid transparent;outline:none;
  width:100%;line-height:1.45;
}
.dp-title-input:hover{border-color:var(--border);background:var(--bg2)}
.dp-title-input:focus{border-color:var(--border2);background:var(--bg2)}
.dp-close{
  width:28px;height:28px;border-radius:var(--radius-sm);
  border:none;background:transparent;color:var(--text3);
  cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.dp-close:hover{background:var(--bg2);color:var(--text)}
.dp-meta{padding:10px 16px;display:flex;flex-direction:column}
.dp-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-bottom:0.5px solid var(--bg3);gap:8px;
}
.dp-row:last-child{border-bottom:none}
.dp-lbl{font-size:11px;color:var(--text3);flex-shrink:0}
.dp-val{font-size:12px;font-weight:500;color:var(--text);text-align:right;word-break:break-word}
.dp-edit{
  font-size:12px;font-weight:500;border:none;background:transparent;
  color:var(--text);font-family:inherit;padding:2px 5px;
  border-radius:4px;border:0.5px solid transparent;outline:none;
  max-width:150px;text-align:right;width:auto;
}
.dp-edit:hover{border-color:var(--border);background:var(--bg2)}
.dp-edit:focus{border-color:var(--border2);background:var(--bg2)}
.dp-sec{font-size:10px;font-weight:600;color:var(--text3);padding:12px 16px 6px;letter-spacing:.06em;text-transform:uppercase}
.progress-wrap{padding:0 16px 12px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px}
.progress-bar-bg{height:4px;background:var(--bg3);border-radius:var(--pill);overflow:hidden}
.progress-bar-fill{height:100%;border-radius:var(--pill);background:var(--text)}
.progress-bar-fill.done-bar{background:var(--green)}.progress-bar-fill.over-bar{background:var(--red)}
.timeline{padding:0 16px 12px;display:flex;flex-direction:column}
.tl-item{display:flex;gap:8px;position:relative}
.tl-line{position:absolute;left:5px;top:13px;bottom:-2px;width:1px;background:var(--border)}
.tl-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:2px;border:1.5px solid var(--border);background:var(--bg);position:relative;z-index:1}
.tl-dot.create{background:var(--blue);border-color:var(--blue)}
.tl-dot.status{background:var(--orange);border-color:var(--orange)}
.tl-dot.done{background:var(--green);border-color:var(--green)}
.tl-body{flex:1;padding-bottom:12px;min-width:0}
.tl-row{display:flex;align-items:flex-start;justify-content:space-between;gap:4px}
.tl-del{width:16px;height:16px;border-radius:3px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:11px;flex-shrink:0;opacity:0;display:flex;align-items:center;justify-content:center}
.tl-item:hover .tl-del{opacity:1}.tl-del:hover{background:var(--red-bg);color:var(--red)}
.tl-author{font-size:10px;font-weight:600;padding:1px 5px;border-radius:var(--pill);background:var(--purple-bg);color:var(--purple-t);margin-right:4px}
.tl-text{font-size:12px;line-height:1.5;color:var(--text2);word-break:break-word}
.tl-date{font-size:10px;color:var(--text3);margin-top:2px;white-space:nowrap}
.dp-note{padding:12px 16px}
.note-input{width:100%;padding:8px 10px;font-size:12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-family:inherit;resize:none;height:58px}
.note-input:focus{outline:none;border-color:var(--border2)}
.note-submit{width:100%;margin-top:6px;padding:0;height:34px;font-size:12px;font-weight:600;border:none;border-radius:var(--radius-sm);background:var(--text);color:var(--bg);cursor:pointer}
.note-submit:hover{opacity:.82}
.divider{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:8px;padding:4px 0 6px}
.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:var(--border)}

/* ── 터치 지원 ── */
button,[onclick],[data-nav],.sb-item,.task-card,.chip{
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}

/* ══════════════════════════════════════════
   반응형 — 태블릿 (768px ~ 1023px)
══════════════════════════════════════════ */
@media(max-width:1023px){
  :root{--sw:220px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .detail-panel{width:280px;min-width:240px}
}

/* ══════════════════════════════════════════
   반응형 — 모바일 (~ 767px)
══════════════════════════════════════════ */
@media(max-width:767px){
  :root{--sw:220px}

  /* 사이드바 슬라이드 */

  /* 햄버거 표시 */
  

  /* 메인 영역 */
  
  .topbar{padding:0 14px;gap:8px}
  .page-title{font-size:14px}

  /* 통계 2열 */
  .stats{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
  .stat{padding:12px}
  .stat-value{font-size:18px}

  /* 필터 스크롤 */
  .filter-row{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .filter-row::-webkit-scrollbar{display:none}

  /* 카드 */
  .task-card{padding:10px 12px;gap:8px}
  .task-title{font-size:12px}
  .card-right{position:static;margin-left:auto;flex-shrink:0}

  /* 상세 패널 전체화면 */
  .detail-panel{
    position:fixed;inset:0;width:100%;max-width:100%;
    border-radius:0;z-index:350;max-height:100vh;
    top:0!important;
  }
  .resizer{display:none}

  /* 모달 */
  .modal{max-width:100%;margin:0;border-radius:var(--radius) var(--radius) 0 0;
    position:fixed;bottom:0;left:0;right:0;max-height:90vh;}
  .overlay{align-items:flex-end;padding:0}

  /* 버튼 크기 */
  .btn-ghost,.btn-solid,.btn-ok,.btn-cancel{height:38px;font-size:13px}
  .chip{min-height:34px;padding:5px 12px}
}

/* ── 페이지 고유 CSS ── */

.pin-btn,.del-btn{width:24px;height:24px;border-radius:var(--radius-sm);border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--text3);display:flex;align-items:center;justify-content:center}
.pin-btn:hover{background:var(--bg3);color:var(--text)}
.pin-btn.on{color:var(--blue)}
/* ── 캘린더 전용 CSS ── */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:10px}
.cal-title{font-size:18px;font-weight:600;color:var(--text);min-width:120px;text-align:center}
.nav-btn{width:30px;height:30px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.nav-btn:hover{border-color:var(--border2);color:var(--text)}
.today-btn{padding:5px 12px;border-radius:var(--radius-sm);font-size:12px;border:0.5px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;touch-action:manipulation}
.today-btn:hover{border-color:var(--border2);color:var(--text)}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:.75rem}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cal-grid{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:0.5px solid var(--border)}
.cal-weekday{padding:8px;font-size:11px;font-weight:600;color:var(--text3);text-align:center}
.cal-weekday:first-child{color:var(--red)}
.cal-weekday:last-child{color:var(--blue)}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day{min-height:100px;border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);padding:4px 3px 3px;overflow:hidden;box-sizing:border-box}
.cal-day:nth-child(7n){border-right:none}
.cal-day.other-month .day-num{color:var(--text3)}
.cal-day.today .day-num{background:var(--text);color:var(--bg);border-radius:50%}
.day-num{font-size:11px;font-weight:500;width:20px;height:20px;display:flex;align-items:center;justify-content:center;margin-bottom:2px}
.day-num.sun{color:var(--red)}
.day-num.sat{color:var(--blue)}
.event-bars{display:flex;flex-direction:column;gap:2px}
.event-bar{font-size:10px;font-weight:500;padding:1px 4px;border-radius:3px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;line-height:1.6;touch-action:manipulation}
.event-bar:hover{opacity:.8}
.bar-start{border-radius:3px 0 0 3px}
.bar-end{border-radius:0 3px 3px 0}
.bar-mid{border-radius:0}
.bar-single{border-radius:3px}
.more-label{font-size:10px;color:var(--text3);padding:1px 3px;cursor:pointer}
.cat-manage{padding:1.5rem 24px;max-width:600px}
.cat-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem}
.cat-row{display:flex;align-items:center;gap:10px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:.7rem 1rem}
.cat-color-inp{width:28px;height:28px;padding:2px;border:0.5px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0}
.cat-name-inp{flex:1;font-size:14px;font-weight:500;border:none;background:transparent;color:var(--text);font-family:inherit;outline:none;padding:2px 4px;border-radius:4px;border:0.5px solid transparent}
.cat-name-inp:focus{border-color:var(--border);background:var(--bg2)}
.cat-del-btn{padding:4px 10px;font-size:12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--text2);cursor:pointer;flex-shrink:0}
.cat-del-btn:hover{background:var(--red-bg);color:var(--red)}
.tab-row{display:flex;border-bottom:0.5px solid var(--border);background:var(--bg);padding:0 24px;flex-shrink:0}
.tab-btn{padding:10px 16px;font-size:12px;font-weight:500;color:var(--text2);border:none;border-bottom:2px solid transparent;background:transparent;cursor:pointer;touch-action:manipulation}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--text)}
.repeat-box{border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;background:var(--bg2);margin-top:6px;display:flex;flex-direction:column;gap:8px}
.repeat-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px}
.repeat-row select,.repeat-row input[type=number]{width:auto;padding:5px 8px;font-size:13px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-family:inherit;outline:none}
.repeat-edit-opts{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.repeat-opt{display:flex;align-items:center;gap:8px;padding:10px 12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:13px}
.repeat-opt:hover{border-color:var(--border2);background:var(--bg2)}
.repeat-opt input[type=radio]{width:auto}
@media(max-width:768px){
  .cal-day{min-height:60px}
.event-bar{font-size:9px}
.cal-weekday{font-size:10px;padding:6px 2px}
}

/* ── 업무 상세 모달 ── */
.task-detail-modal{
  background:#fff;border-radius:12px;
  width:100%;max-width:440px;
  max-height:85vh;overflow-y:auto;
  display:flex;flex-direction:column;
}
.task-detail-head{
  padding:16px 18px 12px;
  border-bottom:0.5px solid var(--border);
  position:sticky;top:0;background:#fff;z-index:1;
}
.task-detail-member{font-size:11px;font-weight:600;color:var(--blue);margin-bottom:4px}
.task-detail-title{font-size:15px;font-weight:700;color:var(--text);line-height:1.4;margin-right:28px}
.task-detail-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border:none;background:transparent;cursor:pointer;font-size:16px;color:var(--text3);display:flex;align-items:center;justify-content:center;border-radius:4px}
.task-detail-close:hover{background:var(--bg2)}
.task-detail-body{padding:14px 18px;display:flex;flex-direction:column;gap:0}
.td-row{display:flex;align-items:baseline;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--bg2)}
.td-row:last-child{border-bottom:none}
.td-lbl{font-size:12px;color:var(--text3);flex-shrink:0}
.td-val{font-size:13px;color:var(--text);text-align:right;line-height:1.5}
.td-desc{padding:8px 0;border-bottom:0.5px solid var(--bg2)}
.td-desc .td-lbl{display:block;margin-bottom:4px}
.td-desc .td-val{text-align:left;font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.task-detail-hist{padding:14px 18px}
.task-detail-hist-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.td-hist-item{display:flex;gap:10px;padding:6px 0;border-bottom:0.5px solid var(--bg2)}

.td-hist-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.td-hist-text{font-size:12px;color:var(--text);line-height:1.5}
.td-hist-date{font-size:10px;color:var(--text3);margin-top:2px}
.td-progress{padding:8px 0;border-bottom:0.5px solid var(--bg2)}

<script>

document.addEventListener('DOMContentLoaded', function() {
  // 사이드바 토글
  (function(){
    var sb = document.querySelector('.sidebar');
    var toggle = document.getElementById('sbToggleBtn');
    if(!sb || !toggle) return;
    if(localStorage.getItem('gz_sb_collapsed')==='1') sb.classList.add('collapsed');
    toggle.addEventListener('click', function(){
      sb.classList.toggle('collapsed');
      localStorage.setItem('gz_sb_collapsed', sb.classList.contains('collapsed')?'1':'0');
    });
  })();

  try {
    var _u = JSON.parse(localStorage.getItem('tt_user') || '{}');
    var av = document.getElementById('sbAvatar');
    var nm = document.getElementById('sbUserName');
    var rl = document.getElementById('sbUserRole');
    if (av) av.textContent = (_u.displayName||_u.id||'--').slice(0,1);
    if (nm) nm.textContent = _u.displayName||_u.id||'';
    var isMgr = _u.role==='manager'||_u.role==='admin';
    if (rl) rl.textContent = isMgr ? '팀장' : '팀원';
    var ti = document.getElementById('sbTaskItem');
    var tl = document.getElementById('sbTaskLabel');
    if (ti) ti.dataset.nav = isMgr ? 'manager.html' : 'member.html';
    if (tl) tl.textContent = isMgr ? '팀 업무 현황' : '내 업무';
    if (_u.role==='admin') {
      var as = document.getElementById('sbAdminSec');
      var ai = document.getElementById('sbAdminItem');
      if (as) as.style.display=''; if (ai) ai.style.display='';
    }
  } catch(e){console.error("[GZPlan]",e);}

  document.getElementById('logoutBtn').addEventListener('click', function() {
    localStorage.removeItem('tt_user'); sessionStorage.clear(); location.href='index.html';
  });
  document.querySelectorAll('[data-nav]').forEach(function(el) {
    el.addEventListener('click', function() { location.href = el.dataset.nav; });
  });
  document.querySelectorAll('[data-view]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var v = btn.dataset.view;
      document.getElementById('view-cal').style.display = v==='cal' ? '' : 'none';
      document.getElementById('view-cat').style.display = v==='cat' ? '' : 'none';
      document.getElementById('tab-cal').classList.toggle('active', v==='cal');
      document.getElementById('tab-cat').classList.toggle('active', v==='cat');
    });
  });
  document.getElementById('prevBtn').addEventListener('click', function() { if(window.moveMonth) window.moveMonth(-1); });
  document.getElementById('nextBtn').addEventListener('click', function() { if(window.moveMonth) window.moveMonth(1); });
  document.getElementById('todayBtn').addEventListener('click', function() { if(window.goToday) window.goToday(); });
  document.getElementById('addPersonalBtn').addEventListener('click', function() { if(window.openAddModal) window.openAddModal('personal'); });
  document.getElementById('addCommonBtnTop').addEventListener('click', function() { if(window.openAddModal) window.openAddModal('common'); });
  document.getElementById('addCommonBtn')?.addEventListener('click', function() { if(window.openAddModal) window.openAddModal('common'); });
  document.getElementById('addCatBtn').addEventListener('click', function() { if(window.addCategory) window.addCategory(); });
  document.getElementById('addCancelBtn').addEventListener('click', function() { if(window.closeModal) window.closeModal('addOverlay'); });
  document.getElementById('addSubmitBtn').addEventListener('click', function() { if(window.submitEvent) window.submitEvent(); });
  document.getElementById('repeatEditCancelBtn').addEventListener('click', function() { if(window.closeModal) window.closeModal('repeatEditOverlay'); });
  document.getElementById('repeatEditOkBtn').addEventListener('click', function() { if(window.confirmRepeatEdit) window.confirmRepeatEdit(); });
  document.getElementById('repeatDelCancelBtn').addEventListener('click', function() { if(window.closeModal) window.closeModal('repeatDelOverlay'); });
  document.getElementById('repeatDelOkBtn').addEventListener('click', function() { if(window.confirmRepeatDel) window.confirmRepeatDel(); });
  document.getElementById('eRepeatType').addEventListener('change', function() { if(window.toggleRepeatOpts) window.toggleRepeatOpts(); });
  document.getElementById('rEndType').addEventListener('change', function() { if(window.toggleRepeatEnd) window.toggleRepeatEnd(); });
  document.getElementById('typeFilterRow').addEventListener('click', function(e) {
    var b = e.target.closest('[data-tf]'); if (b && window.setTF) window.setTF(b.dataset.tf);
  });
  document.getElementById('memberFilterRow').addEventListener('click', function(e) {
    var b = e.target.closest('[data-mf]'); if (b && window.setMF) window.setMF(b.dataset.mf);
  });
  document.querySelectorAll('.overlay').forEach(function(o) {
    o.addEventListener('click', function(e) {
      if (e.target===e.currentTarget && window.closeModal) window.closeModal(o.id);
    });
  });
  document.addEventListener('keydown', function(e) {
    if (e.key==='Escape') document.querySelectorAll('.overlay.show').forEach(function(o) {
      if (window.closeModal) window.closeModal(o.id);
    });
  });
});

</script>

const FC={apiKey:"AIzaSyA7KylsSyT3_0oQvhBtcrPc-gcdfVq90IQ",authDomain:"gzplan.firebaseapp.com",projectId:"gzplan",storageBucket:"gzplan.firebasestorage.app",messagingSenderId:"186255862586",appId:"1:186255862586:web:f36d21f76012ca43b8fe03"};
const MEMBER_IDS=["강신욱","김용욱","오문식","이길우","이도영","이상현","이영찬","이윤형"];

const WD=['일','월','화','수','목','금','토'];
const DEFAULT_CATS=[{id:'meeting',label:'회의',color:'#378ADD'},{id:'report',label:'보고',color:'#7F77DD'},{id:'trip',label:'출장',color:'#EF9F27'},{id:'event',label:'행사',color:'#639922'},{id:'etc',label:'기타',color:'#888888'}];
const toStr=d=>d.toISOString().split('T')[0];
const parse=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)};
const fmt=s=>{if(!s)return'-';const d=parse(s);return`${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()}.`};
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),2400)}
const db=getFirestore(initializeApp(FC));
const sess=localStorage.getItem('tt_user');
if(!sess){location.href='index.html';throw''}
const ME=JSON.parse(sess);
if(!ME.id){location.href='index.html';throw''}
const isMgr=ME.role==='manager'||ME.role==='admin';

// ── 사이드바 초기화 ──
(function() {
  var av = document.getElementById('sbAvatar');
  var nm = document.getElementById('sbUserName');
  var rl = document.getElementById('sbUserRole');
  if (av) av.textContent = (ME.displayName||ME.id||'--').slice(0,1);
  if (nm) nm.textContent = ME.displayName||ME.id||'';
  if (rl) rl.textContent = isMgr ? '팀장' : '팀원';
  // 공통 일정 버튼
  if (isMgr) {
    var cb1 = document.getElementById('addCommonBtnTop');
    if (cb1) cb1.style.display = '';
  }
  // 어드민이면 계정관리 메뉴 표시
  if (ME.role === 'admin') {
    var adminSec = document.getElementById('sbAdminSec');
    var adminItem = document.getElementById('sbAdminItem');
    if (adminSec) adminSec.style.display = '';
    if (adminItem) adminItem.style.display = '';
  }
  // 팀원이면 내업무, 팀장이면 팀업무
  var taskItem = document.getElementById('sbTaskItem');
  if (taskItem) taskItem.dataset.nav = isMgr ? 'manager.html' : 'member.html';
  var taskLabel = document.getElementById('sbTaskLabel');
  if (taskLabel) taskLabel.textContent = isMgr ? '팀 업무 현황' : '내 업무';
})();



// ── 모바일 햄버거 ──
(function() {
  function openSB() {
    var s = document.querySelector('.sidebar');
    var d = document.getElementById('sidebarDim');
    if (s) s.classList.add('open');
    if (d) d.classList.add('show');
    document.body.style.overflow = 'hidden';
  }
  function closeSB() {
    var s = document.querySelector('.sidebar');
    var d = document.getElementById('sidebarDim');
    if (s) s.classList.remove('open');
    if (d) d.classList.remove('show');
    document.body.style.overflow = '';
  }
  var hb = document.getElementById('hamburgerBtn');
  var dim = document.getElementById('sidebarDim');
  if (hb) { hb.onclick = openSB; }
  if (dim) { dim.onclick = closeSB; }
  // 사이드바 nav 클릭시 닫기
  document.querySelectorAll('.sidebar [data-nav]').forEach(function(el) {
    el.addEventListener('click', closeSB);

function getNthWeek(year,month,nth){let n=0,d=new Date(year,month,1);while(d.getDay()!==0)d=new Date(year,month,d.getDate()+1);while(true){const sat=new Date(d.getFullYear(),d.getMonth(),d.getDate()+6);if(sat.getMonth()===month){n++;if(n===nth)return d}d=new Date(d.getFullYear(),d.getMonth(),d.getDate()+7);if(d.getMonth()!==month)break}return null}
function getWeekSun(year,month,td){const d=new Date(year,month,td);return new Date(year,month,td-d.getDay())}
function getRepeatDates(ev,year,month){
  const r=ev.repeat;if(!r||r.type==='none')return[];
  const exc=ev.exceptions||[],res=[];
  if(r.type==='monthly_nth_weekday'){const ws=getNthWeek(year,month,r.week);if(!ws)return[];const d=new Date(ws.getFullYear(),ws.getMonth(),ws.getDate()+r.weekday);if(d.getMonth()===month)res.push(toStr(d))}
  else if(r.type==='monthly_day_weekday'){const dim=new Date(year,month+1,0).getDate();if(r.targetDay>dim)return[];const sun=getWeekSun(year,month,r.targetDay);const d=new Date(sun.getFullYear(),sun.getMonth(),sun.getDate()+r.weekday);res.push(toStr(d))}
  else if(r.type==='monthly_date'){const dim=new Date(year,month+1,0).getDate();if(r.date>dim)return[];res.push(toStr(new Date(year,month,r.date)))}
  return res.filter(s=>(!r.endDate||s<=r.endDate)&&(!ev.startDate||s>=ev.startDate)&&!exc.includes(s));
}
function collect(year,month){
  const fd=toStr(new Date(year,month,1)),ld=toStr(new Date(year,month+1,0)),inst=[];
  if(typeFilter==='all'||typeFilter==='task'){
    (()=>{
      const seen = new Map();
      taskEvents
        .filter(t=>isMgr?(memberFilter==='all'||t._mid===memberFilter):activeMemberCal.has(t._mid))
        .filter(t=>t.startDate<=ld&&t.endDate>=fd)
        .forEach(t=>{
          const sid = t.sharedTaskId || (t.isShared ? t.id : null);
          if(sid){
            if(seen.has(sid)){
              // 기존 항목에 멤버 추가
              const existing = seen.get(sid);
              if(!existing.members) existing.members = [existing._mid];
              if(!existing.members.includes(t._mid)) existing.members.push(t._mid);
            } else {
              const merged = {...t, members: t.members?.length ? t.members : [t._mid]};
              seen.set(sid, merged);
              inst.push({...merged, _type:'task'});
            }
          } else {
            inst.push({...t, _type:'task'});
          }
        });
    })();
  }
  schedules.forEach(ev=>{
    if(typeFilter==='task')return;
    if(typeFilter==='personal'&&ev.type!=='personal')return;
    if(typeFilter==='common'&&ev.type!=='common')return;
    if(ev.type==='personal'&&memberFilter!=='all'&&ev.authorId!==memberFilter)return;
    if(!isMgr&&ev.type==='personal'&&ev.authorId!==ME.id)return;
    if(!ev.repeat||ev.repeat.type==='none'){if(ev.startDate<=ld&&ev.endDate>=fd)inst.push({...ev,_type:ev.type||'personal'})}
    else{getRepeatDates(ev,year,month).forEach(ds=>inst.push({...ev,startDate:ds,endDate:ds,instanceDate:ds,isRepeatInstance:true,_type:ev.type||'personal'}))}
  });
  return inst.sort((a,b)=>a.startDate.localeCompare(b.startDate));
}
function layout(inst,cells){return inst.map(ev=>({event:ev,cells:cells.map((d,i)=>({d,i})).filter(({d})=>d>=ev.startDate&&d<=ev.endDate).map(({i})=>i)})).filter(r=>r.cells.length>0)}
function renderCalendar(){

window.openTaskDetailModal = (t) => {
  const sl = {todo:'대기', inprogress:'진행 중', done:'완료'};
  const PL = {5:'매우 긴급',4:'긴급',3:'보통',2:'낮음',1:'매우 낮음'};
  const PC = {5:'#A32D2D',4:'#EF9F27',3:'#378ADD',2:'#639922',1:'#888'};
  const fmtD = s => { if(!s) return '-'; const d=new Date(s+'T00:00:00'); return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`; };
  const fmtDt = s => { if(!s) return '-'; const d=new Date(s); return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
  const daysElapsed = s => { if(!s) return 0; return Math.floor((Date.now()-new Date(s+'T00:00:00').getTime())/86400000); };

  // 진행바
  const progressBar = (() => {
    if (!t.startDate || !t.due) return '';
    const start = new Date(t.startDate+'T00:00:00');
    const end   = new Date(t.due+'T00:00:00');
    const today = new Date(); today.setHours(0,0,0,0);
    const total   = Math.ceil((end-start)/86400000);
    const elapsed = Math.ceil((today-start)/86400000);
    if (total <= 0) return '';
    const pct = Math.min(100,Math.max(0,Math.round(elapsed/total*100)));
    const isDone = t.status==='done';
    const isOver = elapsed>total && !isDone;
    const color  = isDone?'var(--green)':isOver?'var(--red)':'var(--blue)';
    const label  = isDone?'완료':isOver?`기한 초과 +${elapsed-total}일`:`${Math.max(0,elapsed)}일 / ${total}일 (${pct}%)`;
    return `<div class="td-progress">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:6px"><span>진행</span><span>${label}</span></div>
      <div style="height:4px;background:var(--border);border-radius:2px"><div style="height:4px;background:${color};border-radius:2px;width:${pct}%"></div></div>

  // 히스토리

      <div class="task-detail-member">${t._mid||''}</div>

    </div>
    <div class="task-detail-body">
      ${t.desc ? `<div class="td-desc"><span class="td-lbl">설명</span><div class="td-val">${t.desc}</div></div>` : ''}
      <div class="td-row"><span class="td-lbl">중요도</span><span class="td-val" style="color:${PC[t.priority||3]};font-weight:600">${PL[t.priority||3]}</span></div>
      <div class="td-row"><span class="td-lbl">업무 발생일</span><span class="td-val">${fmtD(t.occurredDate)}${t.occurredDate&&daysElapsed(t.occurredDate)>0?` <span style="color:#EF9F27;font-size:11px;font-weight:600">${daysElapsed(t.occurredDate)}일 경과</span>`:''}</span></div>
      <div class="td-row"><span class="td-lbl">업무 시작일</span><span class="td-val">${fmtD(t.startDate)}</span></div>
      <div class="td-row"><span class="td-lbl">업무 타겟일</span><span class="td-val">${fmtD(t.due)}</span></div>
      <div class="td-row"><span class="td-lbl">마지막 업데이트</span><span class="td-val">${fmtDt(t.updated)}</span></div>
      ${progressBar}
      <div class="td-row"><span class="td-lbl">상태</span><span class="td-val" style="font-weight:600">${sl[t.status]||'-'}</span></div>

  const cat=CAT_MAP[ev.category]||{label:'기타',color:'#888'};
  const rl=getRL(ev.repeat);
  document.getElementById('detailContent').innerHTML=`<div class="detail-cat" style="background:${isC?'#5F5E5A':cat.color}">${isC?'🏢 공통 일정':cat.label}</div><h3 style="font-size:16px;font-weight:600;margin-bottom:12px">${ev.title}</h3><div class="detail-row"><span class="detail-lbl">날짜</span><span class="detail-val">${fmt(ev.startDate)}${ev.startDate!==ev.endDate?' ~ '+fmt(ev.endDate):''}</span></div>${isR?`<div class="detail-row"><span class="detail-lbl">반복</span><span class="detail-val"><span class="repeat-badge">🔁 ${rl}</span></span></div>`:''}${ev.memo?`<div class="detail-row"><span class="detail-lbl">메모</span><span class="detail-val">${ev.memo}</span></div>`:''}<div class="detail-row"><span class="detail-lbl">작성자</span><span class="detail-val">${ev.author||'-'}</span></div>`;
  document.getElementById('detailBtns').innerHTML=canEdit?`<button class="btn-danger" onclick="reqDel('${id}','${instanceDate}')">삭제</button><button class="btn-cancel" onclick="closeModal('detailOverlay')">닫기</button><button class="btn-ok" onclick="openEdit('${id}','${instanceDate}')">수정</button>`:`<button class="btn-cancel" onclick="closeModal('detailOverlay')" style="margin-left:auto">닫기</button>`;
  document.getElementById('detailOverlay').classList.add('show');
};
function getRL(r){if(!r||r.type==='none')return'';if(r.type==='monthly_nth_weekday')return`매월 ${r.week}번째 주 ${WD[r.weekday]}요일`;if(r.type==='monthly_day_weekday')return`매월 ${r.targetDay}일 포함 주 ${WD[r.weekday]}요일`;if(r.type==='monthly_date')return`매월 ${r.date}일`;return''}
window.openAddModal=(type='personal')=>{
  editingId=null;editScope=null;editInstanceDate=null;editType=type;
  document.getElementById('addModalTitle').textContent=type==='common'?'🏢 공통 일정 추가':'개별 일정 추가';
  document.getElementById('addSubmitBtn').textContent='추가하기';
  document.getElementById('eTitle').value='';document.getElementById('eCategory').value=CAT_LIST[0]?.id||'meeting';
  document.getElementById('eMemo').value='';document.getElementById('eRepeatType').value='none';
  document.getElementById('addErrLine').textContent='';
  const td=toStr(new Date());document.getElementById('eStart').value=td;document.getElementById('eEnd').value=td;
  toggleRepeatOpts();document.getElementById('addOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('eTitle').focus(),80);
};
window.toggleRepeatOpts=()=>{
  const t=document.getElementById('eRepeatType').value;
  document.getElementById('repeatOpts').style.display=t==='none'?'none':'';
  document.getElementById('rNthWeekday').style.display=t==='monthly_nth_weekday'?'':'none';
  document.getElementById('rDayWeekday').style.display=t==='monthly_day_weekday'?'':'none';
  document.getElementById('rMonthlyDate').style.display=t==='monthly_date'?'':'none';
};
window.toggleRepeatEnd=()=>{document.getElementById('rEndDate').style.display=document.getElementById('rEndType').value==='date'?'':'none'};
window.submitEvent=async()=>{
  const title=document.getElementById('eTitle').value.trim(),cat=document.getElementById('eCategory').value;
  const sd=document.getElementById('eStart').value,ed=document.getElementById('eEnd').value;
  const memo=document.getElementById('eMemo').value.trim(),rt=document.getElementById('eRepeatType').value;
  const err=document.getElementById('addErrLine');err.textContent='';
  if(!title){err.textContent='제목을 입력해주세요';return}
  if(!sd){err.textContent='시작일을 입력해주세요';return}
  if(!ed){err.textContent='종료일을 입력해주세요';return}
  if(ed<sd){err.textContent='종료일이 시작일보다 빨라요';return}
  let repeat={type:'none'};
  if(rt!=='none'){
    const ret=document.getElementById('rEndType').value,red=ret==='date'?document.getElementById('rEndDate').value:null;
    if(rt==='monthly_nth_weekday')repeat={type:rt,week:Number(document.getElementById('rNth').value),weekday:Number(document.getElementById('rWeekday1').value),endDate:red};
    else if(rt==='monthly_day_weekday')repeat={type:rt,targetDay:Number(document.getElementById('rTargetDay').value),weekday:Number(document.getElementById('rWeekday2').value),endDate:red};
    else if(rt==='monthly_date')repeat={type:rt,date:Number(document.getElementById('rDate').value),endDate:red};
  }
  const btn=document.getElementById('addSubmitBtn');btn.disabled=true;btn.textContent='저장 중...';
  try{
    const data={title,category:cat,startDate:sd,endDate:ed,memo,repeat,author:ME.displayName,authorId:ME.id,updatedAt:new Date().toISOString()};
    if(editingId){
      if(editScope==='this'){
        const orig=schedules.find(e=>e.id===editingId);
        await updateDoc(doc(db,'schedules',editingId),{exceptions:[...(orig?.exceptions||[]),editInstanceDate]});
        await addDoc(collection(db,'schedules'),{...data,type:orig?.type||'personal',repeat:{type:'none'},isException:true,seriesId:orig?.seriesId||editingId,createdAt:new Date().toISOString()});
        toast('이 일정만 수정됐어요 ✓');
      }else if(editScope==='future'){
        const orig=schedules.find(e=>e.id===editingId);
        const prev=toStr(new Date(parse(editInstanceDate).getTime()-86400000));
        await updateDoc(doc(db,'schedules',editingId),{repeat:{...orig?.repeat,endDate:prev}});
        await addDoc(collection(db,'schedules'),{...data,type:orig?.type||'personal',seriesId:Date.now()+'_'+ME.id,createdAt:new Date().toISOString()});
        toast('이후 일정이 수정됐어요 ✓');
      }else{await updateDoc(doc(db,'schedules',editingId),data);toast('일정이 수정됐어요 ✓')}
    }else{
      if(repeat.type!=='none')data.seriesId=Date.now()+'_'+ME.id;
      data.type=editType;data.createdAt=new Date().toISOString();
      await addDoc(collection(db,'schedules'),data);toast('일정을 추가했어요 ✓');
    }
    closeModal('addOverlay');
  }catch(e){document.getElementById('addErrLine').textContent='오류: '+e.message}
  finally{btn.disabled=false;btn.textContent=editingId?'저장하기':'추가하기'}
};
window.openEdit=(id,instanceDate)=>{
  const ev=schedules.find(e=>e.id===id);if(!ev)return;
  if(ev._demo){toast('샘플 데이터예요. 실제 일정을 추가해보세요 :)');return;}
  closeModal('detailOverlay');
  if(ev.repeat&&ev.repeat.type!=='none'){pendingRepeatAction={id,instanceDate};document.getElementById('repeatEditOverlay').classList.add('show');return}
  fillEdit(ev);
};
window.confirmRepeatEdit=()=>{
  const scope=document.querySelector('input[name="repeatEdit"]:checked').value;closeModal('repeatEditOverlay');
  const ev=schedules.find(e=>e.id===pendingRepeatAction.id);if(!ev)return;
  fillEdit(ev,pendingRepeatAction.instanceDate,scope);
};
function fillEdit(ev,instanceDate=null,scope=null){
  editingId=ev.id;editScope=scope;editInstanceDate=instanceDate;editType=ev.type||'personal';
  document.getElementById('addModalTitle').textContent=ev.type==='common'?'🏢 공통 일정 수정':'일정 수정';
  document.getElementById('addSubmitBtn').textContent='저장하기';
  document.getElementById('eTitle').value=ev.title;document.getElementById('eCategory').value=ev.category||CAT_LIST[0]?.id;
  document.getElementById('eStart').value=ev.startDate;document.getElementById('eEnd').value=ev.endDate;
  document.getElementById('eMemo').value=ev.memo||'';document.getElementById('addErrLine').textContent='';
  const r=ev.repeat||{type:'none'};document.getElementById('eRepeatType').value=r.type||'none';
  if(r.type==='monthly_nth_weekday'){document.getElementById('rNth').value=r.week;document.getElementById('rWeekday1').value=r.weekday}
  else if(r.type==='monthly_day_weekday'){document.getElementById('rTargetDay').value=r.targetDay;document.getElementById('rWeekday2').value=r.weekday}
  else if(r.type==='monthly_date'){document.getElementById('rDate').value=r.date}
  if(r.endDate){document.getElementById('rEndType').value='date';document.getElementById('rEndDate').value=r.endDate;document.getElementById('rEndDate').style.display=''}
  else{document.getElementById('rEndType').value='endless';document.getElementById('rEndDate').style.display='none'}
  toggleRepeatOpts();document.getElementById('addOverlay').classList.add('show');
}
window.reqDel=(id,instanceDate)=>{
  const ev=schedules.find(e=>e.id===id);if(!ev)return;
  if(ev._demo){toast('샘플 데이터예요. 실제 일정을 추가해보세요 :)');return;}
  closeModal('detailOverlay');
  if(ev.repeat&&ev.repeat.type!=='none'){pendingDelId={id,instanceDate};document.getElementById('repeatDelOverlay').classList.add('show');return}
  if(confirm('이 일정을 삭제할까요?'))deleteDoc(doc(db,'schedules',id)).then(()=>toast('일정을 삭제했어요'));
};
window.confirmRepeatDel=async()=>{
  const scope=document.querySelector('input[name="repeatDel"]:checked').value;closeModal('repeatDelOverlay');
  const{id,instanceDate}=pendingDelId;const ev=schedules.find(e=>e.id===id);if(!ev)return;
  if(scope==='this'){await updateDoc(doc(db,'schedules',id),{exceptions:[...(ev.exceptions||[]),instanceDate]});toast('이 일정을 삭제했어요')}
  else if(scope==='future'){const prev=toStr(new Date(parse(instanceDate).getTime()-86400000));await updateDoc(doc(db,'schedules',id),{repeat:{...ev.repeat,endDate:prev}});toast('이후 일정을 삭제했어요')}
  else{await deleteDoc(doc(db,'schedules',id));toast('모든 반복 일정을 삭제했어요')}
};
window.switchView=tab=>{
  document.getElementById('view-cal').style.display=tab==='cal'?'':'none';
  document.getElementById('view-cat').style.display=tab==='cat'?'':'none';
  document.getElementById('tab-cal').classList.toggle('active',tab==='cal');
  document.getElementById('tab-cat').classList.toggle('active',tab==='cat');
};
window.closeModal=id=>document.getElementById(id).classList.remove('show');
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===e.currentTarget)e.target.classList.remove('show')}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.overlay.show').forEach(o=>o.classList.remove('show'))});
loadCategories();renderCalendar();
</script>
<script src="./shared/sidebar.js"></script>
</body>
</html>
